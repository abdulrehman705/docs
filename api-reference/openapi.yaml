  /investors/{investor_id}/funding-sources/{id}:
    patch:
      tags:
        - Funding Sources
      summary: Update a funding source
      description: |
        Partial update to a manual / wire funding source. Used to complete
        or correct a source post-connect — the `connect` flow accepts
        partial info, so wire payout details (bank, account, address) are
        commonly filled in here before the source can be used for an
        international-wire withdrawal. Absent fields are left untouched;
        `metadata` merges into the existing object.

        Plaid-connected funding sources cannot be edited — their account
        details are managed by Plaid (returns 400). To change a Plaid-linked
        account, disconnect and reconnect.
      operationId: updateFundingSource
      parameters:
        - $ref: '#/components/parameters/parameters-InvestorIdPath'
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Prefixed public id of the funding source (e.g. `fs_…`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              additionalProperties: false
              properties:
                bank_name:
                  type: string
                account_holder_name:
                  type: string
                bank_account_type:
                  type: string
                  enum:
                    - CHECKING
                    - SAVINGS
                account_number:
                  type: string
                routing_number:
                  type: string
                  description: 9-digit US ABA routing number.
                swift_code:
                  type: string
                beneficiary_address:
                  type: string
                bank_code:
                  type: string
                country:
                  type: string
                  description: ISO 3166-1 alpha-2.
                currency:
                  type: string
                  description: ISO 4217 (3-letter).
                address_line_1:
                  type: string
                city:
                  type: string
                region:
                  type: string
                postal_code:
                  type: string
                iban:
                  type: string
                wire_routing_kind:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              complete_wire_payout:
                summary: Complete wire payout details before an international-wire withdrawal
                value:
                  bank_name: Deutsche Bank
                  account_holder_name: Jane Doe
                  account_number: '0123456789'
                  swift_code: DEUTDEFF
                  address_line_1: 123 Hauptstrasse
                  city: Berlin
                  country: DE
                  currency: EUR
      responses:
        '200':
          description: Funding source updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundingSource'
        '400':
          description: Validation error, or attempt to edit a Plaid-connected source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - Funding Sources
      summary: Disconnect a funding source
      description: |
        Disconnects (soft-deletes) a connected funding source. Returns the
        standard delete shape `{ id, object: "funding_source",
        deleted: true }`.
      operationId: disconnectFundingSource
      parameters:
        - $ref: '#/components/parameters/parameters-InvestorIdPath'
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Prefixed public id of the funding source (e.g. `fs_…`).
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - plaid
              - manual
            default: plaid
      responses:
        '200':
          description: Funding source disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedFundingSource'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /investors/{investor_id}/funding-sources/plaid/link-token:
    post:
