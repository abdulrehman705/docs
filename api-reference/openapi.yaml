            pattern: ^\d{4}-\d{2}-\d{2}$
          description: Filter withdrawals to this date (YYYY-MM-DD).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum number of withdrawals to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of withdrawals to skip for pagination.
      responses:
        '200':
          description: List of withdrawals for the account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
