        has_special_needs:
          type: boolean
          default: false
        linked_goal_id:
          type: string
          description: Optional ID of a financial goal to link
        notes:
          type: string
          maxLength: 1000
        metadata:
          type: object
          additionalProperties: true
    UpdateDependentRequest:
