              description: Planned major life events
            external_accounts:
              type: array
              items:
                $ref: '#/components/schemas/ExternalAccount'
              description: External accounts for net worth tracking (assets & liabilities)
            income:
              $ref: '#/components/schemas/IncomeProfile'
            expenses:
              $ref: '#/components/schemas/ExpenseProfile'
            investment_outlook:
              $ref: '#/components/schemas/InvestmentOutlook'
            status:
              type: string
              enum:
                - active
                - archived
