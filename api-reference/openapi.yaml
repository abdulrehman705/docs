    Dependent:
      description: A dependent (child, spouse, parent, etc.) linked to an investor for financial planning
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            account_id:
              type: string
              readOnly: true
            first_name:
              type: string
              example: Emma
            last_name:
              type: string
              nullable: true
              example: Smith
            relationship:
              type: string
              enum:
                - child
                - spouse
                - partner
                - parent
                - grandchild
                - sibling
                - other
              example: child
            date_of_birth:
              type: string
              format: date
              nullable: true
              example: '2015-03-15'
            financial_support_until:
              type: string
              format: date
              nullable: true
              description: Date until which financial support is expected
            has_education_plans:
              type: boolean
              description: Whether there are education funding plans for this dependent
              example: true
            estimated_education_cost:
              type: string
              nullable: true
              description: Estimated total education cost
              example: '150000.00'
            covered_by_health_insurance:
              type: boolean
            has_special_needs:
              type: boolean
            linked_goal_id:
              type: string
              nullable: true
              description: ID of a linked financial goal (e.g., education fund)
            linked_goal:
              type: object
              nullable: true
              description: Summary of the linked goal (read-only)
              readOnly: true
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                goal_type:
                  type: string
                target_amount:
                  type: string
            notes:
              type: string
              nullable: true
            metadata:
              type: object
              nullable: true
              additionalProperties: true
            status:
              type: string
              enum:
                - active
                - inactive
                - deceased
              example: active
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true
    CreateDependentRequest:
