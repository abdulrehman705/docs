              sdk:
                summary: Get a link_token for Plaid Link SDK
                value:
                  enable_hosted_link: false
              hosted:
                summary: Get a hosted_link_url for the Plaid-hosted flow
                value:
                  enable_hosted_link: true
      responses:
        '200':
          description: Link token created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /investors/{investor_id}/funding-sources/connect:
    post:
      tags:
