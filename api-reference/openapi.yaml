  /assets/{symbol}:
    get:
      tags:
        - Assets
      summary: Get a single asset by symbol/ticker
      description: |
        Looks up an asset by symbol across all supported markets and providers.

        **Resolution flow:**
        1. Checks database for cached asset
        2. If not found or stale, queries appropriate provider based on market hint
        3. If no market hint, searches all available providers (Alpaca for US, Naya for Nigeria)
        4. Returns asset with current price data

        **Supported markets:**
        - US: XNAS (NASDAQ), XNYS (NYSE), BATS, ARCA, OTC
        - Nigeria: XNSA (Nigerian Stock Exchange)
      operationId: getAssetBySymbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          description: Asset ticker symbol (e.g., AAPL, MSFT, DANGOTE)
          example: AAPL
        - name: market
          in: query
          required: false
          schema:
            type: string
            enum:
              - XNAS
              - XNYS
              - BATS
              - ARCA
              - OTC
              - XNSA
          description: |
            Optional market hint for faster lookup. If provided, only the corresponding 
            provider is queried. Without this hint, all providers are searched.
          example: XNAS
      responses:
        '200':
          description: Asset information with current price data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AssetSearchResult'
              examples:
                asset_details:
                  summary: Asset details for AAPL
                  value:
                    data:
                      id: b0b6dd9d-8b9b-48b9-bbb8-bbbb49bb1bbb
                      class: us_equity
                      market: XNAS
                      symbol: AAPL
                      name: Apple Inc.
                      status: active
                      tradable: true
                      marginable: true
                      shortable: true
                      easy_to_borrow: true
                      fractionable: true
                      currency: USD
                      price: 178.5
                      change: 1.5
                      changePercent: 0.85
                      previousClose: 177
                      bidPrice: 178.48
                      askPrice: 178.52
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
