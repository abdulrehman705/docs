      description: |
        Streams the stored file from object storage for the given `document_id`.
        Response body is raw bytes. `Content-Type` matches the document's stored MIME type
        (for example `application/pdf`, `image/png`). `Content-Disposition` is `attachment`
        with the original `file_name`.
