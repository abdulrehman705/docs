    ResourceEnvelope:
      type: object
      description: |
        Resource envelope. Domain fields are spread after the
        envelope keys (`id`, `object`, `created`, `livemode`, `metadata`).
        Some Buildmarkets-original resources may emit only `object` + `livemode`
        without `id` / `created` (e.g. one-off action results).
      required:
        - object
        - livemode
      additionalProperties: true
      properties:
        id:
          type: string
          description: Prefixed public id (e.g. `inv_…`, `ord_…`, `dep_…`).
          example: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
        object:
          type: string
          description: The resource type discriminator.
          example: investor
        created:
          type: integer
          nullable: true
          description: Unix-seconds timestamp of resource creation.
          example: 1747776000
        livemode:
          type: boolean
          description: |
            Whether this resource was created against a live API key.
            Test-mode keys always return `false`.
          example: false
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Partner-set key/value map for cross-referencing.
    ListEnvelope:
      type: object
      description: |
        List envelope. `data` holds the page of items;
        each item is itself wrapped in a ResourceEnvelope.
      required:
        - object
        - url
        - has_more
        - data
      additionalProperties: true
      properties:
        object:
          type: string
          enum:
            - list
        url:
          type: string
          description: The endpoint path that produced this list.
          example: /v1/investors/inv_…/deposits
        has_more:
          type: boolean
          description: Whether more results exist beyond `data`.
          example: false
        data:
          type: array
          items:
            $ref: '#/components/schemas/ResourceEnvelope'
    ComplianceCheckResponse:
      type: object
      properties:
        workflow_id:
          type: string
          description: The compliance workflow this check belongs to.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        check_type:
          type: string
          enum:
            - identity_verification
            - tax_id_verification
            - screening
            - risk_assessment
            - business_verification
          description: The type of compliance check performed.
          example: identity_verification
        status:
          type: string
          enum:
            - pending
            - clear
            - failed
            - review_required
            - error
          description: |
            Current status of the check:
            - `pending` — Async verification in progress; use `verification_url` or `verification_token` for user completion.
            - `clear` — Verification passed.
            - `failed` — Verification failed.
            - `review_required` — Manual review needed (e.g., potential PEP/sanctions match).
            - `error` — Provider error during verification.
          example: pending
        provider:
          type: string
          nullable: true
          description: The verification provider handling this check (e.g., persona-identity, persona-taxid, dojah).
          example: persona-identity
        external_id:
          type: string
          nullable: true
          description: Provider-specific reference ID for the verification.
          example: inq_abc123def456
        verification_url:
          type: string
          nullable: true
          description: |
            User-facing verification URL for async checks, when available.
          example: https://withpersona.com/verify?inquiry-id=inq_abc123def456
        verification_token:
          type: string
          nullable: true
          description: |
            Provider token or SDK configuration for client-side verification, when available.
          example: null
    Investor:
      description: |
        The investor (account) resource. flat: regulatory fields are
        flat at the top level; only `address`, `signed_agreements[]`, and
        `trusted_contact` retain meaningful nesting. The Alpaca-style
        `contact` / `identity` / `disclosures` block grouping is intentionally
        absent.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            status:
              type: string
              enum:
                - onboarding
                - under_review
                - awaiting_documents
                - active
                - suspended
                - closed
                - declined
                - setup_failed
              description: Buildmarkets-native account status.
              example: onboarding
            account_type:
              type: string
              enum:
                - individual
                - joint
                - corporate
              example: individual
            management_type:
              type: string
              enum:
                - self_directed
                - advised
              example: self_directed
            tax_advantaged:
              type: boolean
              example: false
            tax_designation:
              type: string
              nullable: true
            account_number:
              type: string
              nullable: true
            currency:
              type: string
              example: USD
            balance:
              type: string
              example: '0.00'
            buying_power:
              type: string
              description: Available buying power from the custodian brokerage account. Defaults to "0" when no custodian account exists yet.
              example: '10000.00'
            cash_withdrawable:
              type: string
              description: Amount of cash available for withdrawal from the custodian brokerage account. Defaults to "0" when no custodian account exists yet.
              example: '5000.00'
            last_equity:
              type: string
              example: '0.00'
            crypto_status:
              type: string
              nullable: true
            trading_type:
              type: string
              enum:
                - cash
                - margin
                - null
              nullable: true
            first_name:
              type: string
              example: Jane
            middle_name:
              type: string
              nullable: true
            last_name:
              type: string
              example: Doe
            date_of_birth:
              type: string
              format: date
              nullable: true
              example: '1990-01-01'
            email:
              type: string
              format: email
              example: jane@example.com
            phone:
              type: string
              nullable: true
              example: '+15555550123'
            address:
              type: object
              description: |
                Address record. `street` is an array of one or more street
                lines (multi-line addresses keep one entry per line).
              properties:
                street:
                  type: array
                  items:
                    type: string
                  example:
                    - 123 Market St
                unit:
                  type: string
                  nullable: true
                city:
                  type: string
                  nullable: true
                state:
                  type: string
                  nullable: true
                postal_code:
                  type: string
                  nullable: true
                country:
                  type: string
                  description: ISO 3166-1 alpha-2.
                  nullable: true
                  example: US
            tax_id_type:
              type: string
              enum:
                - SSN
                - ITIN
                - EIN
                - SIN
                - NINO
                - TFN
                - VAT
                - TIN
                - OTHER
              nullable: true
            country_of_tax_residence:
              type: string
              description: ISO 3166-1 alpha-2.
              nullable: true
            country_of_citizenship:
              type: string
              description: ISO 3166-1 alpha-2.
              nullable: true
            country_of_birth:
              type: string
              description: ISO 3166-1 alpha-2.
              nullable: true
            funding_source:
              type: array
              items:
                type: string
                enum:
                  - employment_income
                  - investments
                  - inheritance
                  - business_income
                  - savings
                  - family
                  - other
            is_control_person:
              type: boolean
            is_affiliated_exchange_or_finra:
              type: boolean
            is_affiliated_exchange_or_iiroc:
              type: boolean
              nullable: true
            is_politically_exposed:
              type: boolean
            immediate_family_exposed:
              type: boolean
            employment_status:
              type: string
              enum:
                - employed
                - unemployed
                - student
                - retired
              nullable: true
            employer_name:
              type: string
              nullable: true
            employer_address:
              type: string
              nullable: true
            employment_position:
              type: string
              nullable: true
            signed_agreements:
              type: array
              items:
                type: object
                required:
                  - type
                  - signed_at
                properties:
                  type:
                    type: string
                    description: |
                      Buildmarkets-native agreement key. Translation to Alpaca's
                      wire keys (customer_agreement / account_agreement /
                      margin_agreement) happens internally.
                    enum:
                      - investor_agreement
                      - margin_disclosure_acknowledged
                      - w8ben_certification
                    example: investor_agreement
                  signed_at:
                    type: string
                    format: date-time
                  ip_address:
                    type: string
                    nullable: true
            trusted_contact:
              type: object
              nullable: true
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  nullable: true
            portfolios:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  status:
                    type: string
                  currency:
                    type: string
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
            compliance_checks:
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/ComplianceCheckResponse'
    ErrorEnvelope:
      type: object
      description: |
        Error envelope. The Buildmarkets-specific `BLUM-XXX-XXX`
        code is carried in `error.code`; `error.type` is the broad
        category clients branch on.
      required:
        - error
      properties:
        error:
          type: object
          required:
            - type
            - code
            - message
          properties:
            type:
              type: string
              enum:
                - invalid_request_error
                - authentication_error
                - permission_error
                - not_found_error
                - conflict_error
                - idempotency_error
                - rate_limit_error
                - api_error
              example: invalid_request_error
            code:
              type: string
              description: The Buildmarkets-specific error code.
              example: BLUM-400-001
            message:
              type: string
              description: Developer-facing message.
            param:
              type: string
              description: Field path of the invalid input.
              example: tax_id
            doc_url:
              type: string
              format: uri
              example: https://docs.bluum.finance/errors/BLUM-400-001
            request_log_url:
              type: string
              format: uri
              description: Deep link to the request log in the partner dashboard.
    TrustedContact:
      description: |
        FINRA-defined "designated trusted contact" record. Per FINRA SR Rule
        4512, partners must give end-users a way to add or update a trusted
        contact post-onboarding. All four fields are required together.
      type: object
      required:
        - first_name
        - last_name
        - email
        - phone
      properties:
        first_name:
          type: string
          example: Mary
        last_name:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: mary@example.com
        phone:
          type: string
          description: Phone number in E.164 format.
          example: '+15555550199'
    OrderEstimateRequest:
      type: object
      required:
        - symbol
        - side
        - type
      properties:
        symbol:
          type: string
          description: Ticker symbol of the asset to estimate.
          example: AAPL
        market:
          type: string
          description: Optional market disambiguation (same as place order).
        isin:
          type: string
          description: Optional ISIN.
        figi:
          type: string
          description: Optional FIGI.
        side:
          type: string
          enum:
            - buy
            - sell
        type:
          type: string
          enum:
            - market
            - limit
          description: |
            Only `market` and `limit` are supported. Stop, stop-limit, and trailing orders cannot be estimated via this endpoint.
        quantity:
          type: string
          description: |
            Share quantity (required for sell; for market buy, provide either `quantity` or `notional`).
          example: '10'
        notional:
          type: string
          description: Dollar amount for a market buy estimate when `quantity` is omitted; uses the asset reference price. Not supported for sells.
          example: '1000.00'
        limit_price:
          type: string
          description: Required when `type` is `limit` (with `quantity`).
    OrderEstimate:
      description: |
        Pre-trade cost estimate from the routed custodian. Values are indicative only;
        execution price and fees may differ.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            object:
              type: string
              example: order_estimate
            investor_id:
              type: string
            symbol:
              type: string
            side:
              type: string
              enum:
                - buy
                - sell
            type:
              type: string
              enum:
                - market
                - limit
            currency:
              type: string
              example: USD
            total_estimated_value:
              type: string
              description: Formatted total estimated value (currency precision).
            estimated_price:
              type: string
              nullable: true
            estimated_quantity:
              type: string
              nullable: true
            commission:
              type: string
              nullable: true
            errors:
              type: array
              items:
                type: string
              nullable: true
    OrderBondExecutionDetails:
      type: object
      description: |
        Fixed-income execution detail. Populated only when the underlying
        asset is a bond. Prices are % of par; accrued and face_value are
        in `currency`.
      properties:
        clean_price:
          type: string
          description: Clean price at execution, % of par.
          example: '99.875'
        dirty_price:
          type: string
          description: Dirty price at execution (clean + accrued), % of par.
          example: '100.342'
        accrued_interest:
          type: string
          description: Accrued interest paid to seller per 100 face value.
          example: '0.467'
        face_value:
          type: string
          description: Face value of the trade (matches `quantity`).
          example: '10000'
        yield_at_execution:
          type: string
          description: Yield realized at execution, decimal.
          example: '0.0475'
    BondAttributes:
      type: object
      description: |
        Fixed-income attributes. Populated only when `class` is `bond` /
        `bill` / `note`. Equity / crypto / ETF assets omit this block.
      properties:
        cusip:
          type: string
          description: 9-character CUSIP (US bonds). For non-US bonds the canonical id lives in `isin`.
          example: 00037BAC6
        isin:
          type: string
          description: 12-character ISIN (international identifier).
          example: US00037BAC63
        bond_status:
          type: string
          enum:
            - outstanding
            - pre_issuance
            - matured
          description: Lifecycle state of the issue.
          example: outstanding
        bond_type:
          type: string
          enum:
            - treasury
            - corporate
            - municipal
            - agency
            - sovereign
          description: Bond category.
          example: corporate
        bond_subtype:
          type: string
          description: Treasury subtype (`bill` / `note` / `bond`) or corporate sub-classification.
          example: bond
        maturity_date:
          type: string
          format: date
          description: Date the bond matures and face value is redeemed.
          example: '2042-05-08'
        issue_date:
          type: string
          format: date
          example: '2012-05-08'
        dated_date:
          type: string
          format: date
        first_coupon_date:
          type: string
          format: date
        next_coupon_date:
          type: string
          format: date
        last_coupon_date:
          type: string
          format: date
        coupon_rate:
          type: string
          description: Annual coupon rate as a decimal (e.g. "0.04375" = 4.375%).
          example: '4.375'
        coupon_type:
          type: string
          description: '"fixed" | "zero" | "floating" | ...'
          example: fixed
        coupon_frequency:
          type: integer
          description: Payments per year (1=annual, 2=semi_annual, 4=quarterly, 12=monthly, 0=zero/at_maturity).
          example: 2
        accrual_basis:
          type: string
          description: Day-count convention (`ACT/ACT`, `ACT/360`, `30/360`, ...).
          example: 30/360
        accrued_interest:
          type: number
          description: Accrued interest per 100 face since the last coupon.
          example: 2.795139
        face_value:
          type: string
          description: Par value of one unit, in `currency`.
          example: '1000'
        min_increment:
          type: string
          description: Minimum face-value purchase increment. Orders must be multiples of this.
          example: '2000'
        settlement_period:
          type: integer
          description: T+N business days for settlement (1 for treasuries, 2 for corporates).
          example: 2
        close_price_date:
          type: string
          format: date
          description: Date of the last close price.
          example: '2026-05-29'
        yield_to_maturity:
          type: number
          description: Yield to maturity (annualized decimal).
          example: 5.485755
        yield_to_worst:
          type: number
          description: Yield to worst (annualized decimal).
          example: 5.485755
        callable:
          type: boolean
          example: false
        puttable:
          type: boolean
          example: false
        convertible:
          type: boolean
          example: false
        perpetual:
          type: boolean
          example: false
        next_call_date:
          type: string
          format: date
        next_call_price:
          type: number
        call_type:
          type: string
          example: make_whole
        issuer:
          type: string
          description: Issuing entity. Corporate bonds only — treasuries omit.
          example: ABB Finance (USA) Inc.
        ticker:
          type: string
          description: Bond ticker (Bloomberg-style). Corporate bonds only.
          example: ABBNVX
        sector:
          type: string
          example: Capital Goods
        seniority:
          type: string
          example: Senior
        country_domicile:
          type: string
          description: ISO country of the issuer.
          example: US
        rating:
          type: string
          description: Composite credit rating (currently S&P).
          example: AAA
        sp_rating:
          type: string
          description: S&P rating.
          example: AAA
        sp_outlook:
          type: string
          enum:
            - positive
            - negative
            - stable
            - developing
          example: stable
    DeletedFundingSource:
      description: |
        standard delete response returned by
        `DELETE /v1/investors/{investor_id}/funding-sources/{id}`.
      type: object
      required:
        - id
        - object
        - deleted
      properties:
        id:
          type: string
          example: fs_01j9x8m2k7qpzwv3t5r6y8n0ab
        object:
          type: string
          enum:
            - funding_source
        deleted:
          type: boolean
          enum:
            - true
    CreateLinkTokenRequest:
      type: object
      description: |
        Request body for creating a Link token. 
        Set enable_hosted_link to true to get a hosted_link_url for Plaid Hosted Link flow.
      properties:
        enable_hosted_link:
          type: boolean
          default: false
          description: |
            If true, returns a hosted_link_url that can be used to redirect users 
            to a Plaid-hosted page for bank account linking. 
            When false or omitted, only returns a link_token for SDK-based integration.
          example: true
    ConnectPlaidRequest:
      type: object
      description: Connect a bank account via Plaid by exchanging the public token from Plaid Link
      required:
        - type
        - public_token
      properties:
        type:
          type: string
          enum:
            - plaid
          description: Funding source type
          example: plaid
        public_token:
          type: string
          description: Public token from Plaid Link
          example: public-production-abc123def456
    ConnectManualRequest:
      type: object
      description: Add a bank account manually with bank details
      required:
        - type
        - bank_name
        - account_holder_name
        - account_number
      properties:
        type:
          type: string
          enum:
            - manual
          description: Funding source type
          example: manual
        bank_name:
          type: string
          description: Name of the bank
          example: First National Bank
        account_holder_name:
          type: string
          description: Name of the account holder
          example: Jane Doe
        bank_account_type:
          type: string
          enum:
            - CHECKING
            - SAVINGS
          description: Bank account type
          example: CHECKING
        account_number:
          type: string
          minLength: 4
          description: Bank account number
          example: '1234567890'
        routing_number:
          type: string
          description: 9-digit ABA routing number (US accounts)
          example: '021000021'
        swift_code:
          type: string
          description: SWIFT/BIC code (international accounts)
          example: FNBMUS33
        beneficiary_address:
          type: string
          description: Beneficiary address
          example: 123 Main St, New York, NY 10001
        currency:
          type: string
          description: 3-letter currency code
          example: USD
        country:
          type: string
          description: 2-letter country code
          example: US
        bank_code:
          type: string
          description: Bank code (for non-US accounts)
        address_line_1:
          type: string
          description: Beneficiary street line (wire payout)
        city:
          type: string
          description: Beneficiary city (wire payout)
        region:
          type: string
          description: State / province / region (wire payout)
        postal_code:
          type: string
          description: Postal or ZIP code (wire payout)
        iban:
          type: string
          description: IBAN for jurisdictions that use it (wire payout)
        wire_routing_kind:
          type: string
          maxLength: 32
          description: |
            When `bank_code` carries a non-US routing identifier, set this to the Alpaca routing-code type
            consumed only by the custodian layer (e.g. `sort_code`, `ifsc`). Omit for US ABA (`routing_number`).
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary metadata key-value pairs
    Bank:
      type: object
      description: |
        Display name and routing `code` for a bank.
      required:
        - name
        - code
      properties:
        name:
          type: string
          description: Bank display name
          example: Access Bank
        code:
          type: string
          description: Bank code for account routing
          example: '044'
    ComplianceInitiationResponse:
      type: object
      properties:
        workflowId:
          type: string
          format: uuid
          description: The newly created compliance workflow ID.
        status:
          type: string
          enum:
            - IN_PROGRESS
            - APPROVED
            - REJECTED
            - PENDING_REVIEW
          description: Current workflow status. Typically IN_PROGRESS after initiation.
        complianceChecks:
          type: array
          description: Per-check statuses with SDK handoff data for async providers.
          items:
            $ref: '#/components/schemas/ComplianceCheckResponse'
    Disclosure:
      type: object
      required:
        - object
        - id
        - version
        - source
        - kind
        - route
        - step
        - title
        - requires_acknowledgement
      properties:
        object:
          type: string
          enum:
            - disclosure
        id:
          type: string
          description: Stable identifier referenced when recording an acceptance.
          example: hyc_non_shariah_new_customer_ack
        version:
          type: string
          description: |
            Revision tag. Partners detect copy changes by comparing this
            against the version they last presented to the user.
          example: '2026-05-23'
        source:
          type: string
          enum:
            - alpaca
            - bluum
          description: Whether the disclosure originates from Alpaca or from Buildmarkets.
        kind:
          type: string
          enum:
            - verbatim_text
            - pdf_link
            - html
          description: |
            `verbatim_text` — `text` holds copy the partner must render
            word-for-word. `pdf_link` — `url` points to the canonical PDF.
            `html` — `url` points to an HTML page.
        route:
          type: string
          enum:
            - all
            - us
            - international
          description: Onboarding route this disclosure applies to.
        step:
          type: string
          enum:
            - step_6_affiliations
            - step_7_w8_certification
            - step_9_broker_agreements
            - step_12_post_account
            - step_hyc_enrollment
            - step_fixed_income_enrollment
            - platform_signup
          description: |
            The point in the partner UI where this disclosure must be
            surfaced. `step_hyc_enrollment` is the FDIC Sweep program
            enrollment screen. `step_fixed_income_enrollment` is the
            bond / treasury risk disclosure shown before a partner
            allows the user's first fixed-income order.
        title:
          type: string
          description: Human-readable title for partner UIs (not regulated copy).
        text:
          type: string
          nullable: true
          description: |
            Verbatim regulated text the partner must display unchanged.
            Present only when `kind=verbatim_text`. Translations are
            permitted only if they match word-for-word.
        url:
          type: string
          format: uri
          nullable: true
          description: Canonical URL for `pdf_link` / `html` disclosures, or the underlying PDF for `verbatim_text` disclosures that also have a printable form.
        requires_acknowledgement:
          type: boolean
          description: |
            `true` if the partner must capture an explicit click
            ("Accept", "Enroll", or "I Agree") and record it via
            `POST /v1/investors/{investor_id}/disclosures/acceptances`
            or via the `signed_agreements[]` array on account creation.
        agreement_key:
          type: string
          enum:
            - investor_agreement
            - margin_disclosure_acknowledged
            - w8ben_certification
          nullable: true
          description: |
            When this disclosure corresponds to an entry in the
            `signed_agreements[]` array on `POST /v1/investors`, this
            field holds the matching key. Use it to wire the disclosure
            into the create-investor payload so the acknowledgement is
            captured at account-create time.

            Null for Buildmarkets-side-only disclosures and for HYC / fixed
            income acknowledgements — those are persisted via the
            acceptances endpoint instead.
        source_reference:
          type: string
          description: Internal reference (Alpaca spreadsheet row or Buildmarkets doc) — useful for audit.
    DisclosureAcceptance:
      type: object
      required:
        - object
        - id
        - created
        - data
      properties:
        object:
          type: string
          enum:
            - disclosure_acceptance
        id:
          type: string
          description: Stable id for the acceptance record.
        created:
          type: integer
          format: int64
          description: Unix timestamp when the acceptance was recorded.
        livemode:
          type: boolean
        metadata:
          type: object
          additionalProperties:
            type: string
        data:
          type: object
          required:
            - investor_id
            - disclosure_id
            - version
            - signed_at
          properties:
            investor_id:
              type: string
              description: Prefixed investor id (`inv_…`).
            disclosure_id:
              type: string
              description: Disclosure registry id this acceptance is for.
            version:
              type: string
              description: Version of the disclosure the user acknowledged.
            signed_at:
              type: string
              format: date-time
            ip_address:
              type: string
              nullable: true
            user_agent:
              type: string
              nullable: true
            actor_ref:
              type: string
              nullable: true
    EnrollCashSweepRequest:
      type: object
      required:
        - variant
        - apr_tier_name
      properties:
        variant:
          type: string
          enum:
            - non_shariah
            - shariah
          description: Cash sweep variant
        apr_tier_name:
          type: string
          description: APR tier to assign
        disclosure_acceptance:
          type: object
          description: |
            Optional inline disclosure acceptance. If the required HYC
            disclosures have not been previously accepted, include this
            object to accept them as part of the enrollment call.
          properties:
            signed_at:
              type: string
              format: date-time
              description: ISO 8601 datetime when the user accepted
            ip_address:
              type: string
            user_agent:
              type: string
            actor_ref:
              type: string
    CashSweepEnrollmentResponse:
      type: object
      properties:
        id:
          type: string
          description: Prefixed enrollment ID (e.g. `cse_...`)
        object:
          type: string
          enum:
            - cash_sweep_enrollment
        created:
          type: integer
          description: Unix timestamp of creation
        livemode:
          type: boolean
        metadata:
          type: object
        investor_id:
          type: string
        brokerage_account_id:
