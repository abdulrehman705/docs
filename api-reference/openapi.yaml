  /market-data/assets/search:
    get:
      summary: Search assets across markets
      description: Search for assets by ticker, name, or partial match across all supported markets.
      operationId: searchMarketDataAssets
      tags:
        - Market Data
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (ticker symbol, company name, or partial match)
          schema:
            type: string
        - name: market
          in: query
          description: Filter by market (MIC code or common code)
          schema:
            type: string
        - name: class
          in: query
          description: Filter by canonical instrument class.
          schema:
            type: string
            enum:
              - equity
              - etf
              - bond
              - bill
              - note
              - mutual_fund
              - derivative
              - cryptocurrency
              - commodity
              - real_estate
              - cash
        - name: country
          in: query
          description: Filter by ISO 3166-1 alpha-2 country code (lower-case).
          schema:
            type: string
        - name: asset_class
          in: query
          deprecated: true
          description: |
            **Deprecated.** Combined legacy classifier accepted during the
            asset-class refactor. Prefer `class` + `country`.
          schema:
            type: string
            enum:
              - us_equity
              - crypto
              - us_option
              - ng_equity
              - ng_bond
              - ng_etf
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssetSearchResult'
                  count:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequestError'
  /market-data/assets:
    get:
      summary: Get batch assets or list all assets
      description: |
        Returns asset with current price data. Two modes of operation:

        **Batch Mode (with symbols):** Pass comma-separated symbols to get details for specific assets.
        Maximum 20 symbols per request.

        **List Mode (no symbols):** Omit symbols to get a paginated list of all active assets.
        Use the `limit` parameter to control page size (default 20, max 100).
      operationId: getBatchAssets
      tags:
        - Market Data
      parameters:
        - name: symbols
          in: query
          required: false
          description: Comma-separated list of ticker symbols (max 20). If omitted, returns all assets.
          schema:
            type: string
            example: META,AAPL,TSLA
        - name: market
          in: query
          required: false
          description: Market hint to disambiguate symbols (e.g., XNAS, XNYS, XNSA)
          schema:
            type: string
            example: XNAS
        - name: limit
          in: query
          required: false
          description: Maximum number of assets to return (1-100, default 20). Only applies when symbols is omitted.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: List of asset profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssetSearchResult'
                  count:
                    type: integer
                    description: Number of assets returned
        '400':
          $ref: '#/components/responses/BadRequestError'
