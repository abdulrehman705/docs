      properties:
        goals:
          type: array
          items:
            $ref: '#/components/schemas/GoalInput'
        life_events:
          type: array
          items:
            $ref: '#/components/schemas/LifeEventInput'
        external_accounts:
          type: array
          items:
            $ref: '#/components/schemas/ExternalAccountInput'
        income:
          $ref: '#/components/schemas/IncomeProfile'
        expenses:
          $ref: '#/components/schemas/ExpenseProfile'
        investment_outlook:
          $ref: '#/components/schemas/InvestmentOutlook'
    FinancialPlanSummary:
      type: object
      description: |
