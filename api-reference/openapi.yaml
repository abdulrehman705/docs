components:
  securitySchemes:
    BluumApiKeyAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic Authentication using the **API Key** as username and **API Secret** as password.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token from Clerk authentication
  schemas:
    NewAccountRequest:
      description: |
        flat investor creation body. Regulatory fields live at
        the top level; only `address`, `signed_agreements[]`, and
        `trusted_contact` are nested (each is an independent sub-object).
      type: object
      required:
        - account_type
        - first_name
        - last_name
        - date_of_birth
        - email
        - phone
        - address
        - tax_id
        - tax_id_type
        - country_of_tax_residence
        - country_of_citizenship
        - country_of_birth
        - funding_source
        - annual_income
        - liquid_net_worth
        - is_control_person
        - is_affiliated_exchange_or_finra
        - is_politically_exposed
        - immediate_family_exposed
        - employment_status
        - signed_agreements
      properties:
        account_type:
          type: string
          enum:
            - individual
            - joint
            - corporate
          example: individual
        management_type:
          type: string
          enum:
            - self_directed
            - advised
          default: self_directed
        tax_advantaged:
          type: boolean
          default: false
        tax_designation:
          type: string
          nullable: true
        first_name:
          type: string
          example: Jane
        middle_name:
          type: string
          nullable: true
        last_name:
          type: string
          example: Doe
        date_of_birth:
          type: string
          format: date
          example: '1990-01-01'
        email:
          type: string
          format: email
          example: jane@example.com
        phone:
          type: string
          example: '+15555550123'
        address:
          type: object
          required:
            - street
            - city
            - country
          properties:
            street:
              type: array
              items:
                type: string
              minItems: 1
              description: One or more street lines (the array form is required even for single-line addresses).
              example:
                - 123 Market St
            unit:
              type: string
              nullable: true
            city:
              type: string
              example: Berkeley
            state:
              type: string
              description: Required for US tax residents. Optional otherwise.
              example: CA
            postal_code:
              type: string
              description: Required for US tax residents (5 digits, optionally `-4 digits`). Optional otherwise.
              example: '94704'
            country:
              type: string
              description: ISO 3166-1 alpha-2 country code.
              example: US
        tax_id:
          type: string
          example: 401-23-4567
        tax_id_type:
          type: string
          enum:
            - SSN
            - ITIN
            - EIN
            - SIN
            - NINO
            - TFN
            - VAT
            - TIN
            - OTHER
        tax_id_country:
          type: string
          description: ISO 3166-1 alpha-2 of the tax-id issuing country.
          nullable: true
        country_of_tax_residence:
          type: string
          example: US
        country_of_citizenship:
          type: string
          example: US
        country_of_birth:
          type: string
          example: US
        funding_source:
          type: array
          items:
            type: string
            enum:
              - employment_income
              - investments
              - inheritance
              - business_income
              - savings
              - family
              - other
          example:
            - employment_income
        annual_income:
          type: object
          properties:
            min:
              type: string
            max:
              type: string
        liquid_net_worth:
          type: object
          properties:
            min:
              type: string
            max:
              type: string
        total_net_worth:
          type: object
          properties:
            min:
              type: string
            max:
              type: string
        permanent_resident:
          type: boolean
          nullable: true
        visa_type:
          type: string
          nullable: true
        visa_expiration_date:
          type: string
          format: date
          nullable: true
        is_control_person:
          type: boolean
        is_affiliated_exchange_or_finra:
          type: boolean
        is_affiliated_exchange_or_iiroc:
          type: boolean
          nullable: true
        is_politically_exposed:
          type: boolean
        immediate_family_exposed:
          type: boolean
        affiliated_company:
          type: object
          nullable: true
          properties:
            company_name:
              type: string
            company_address:
              type: string
            company_compliance_email:
              type: string
        employment_status:
          type: string
          enum:
            - employed
            - unemployed
            - student
            - retired
        employer_name:
          type: string
          nullable: true
        employer_address:
          type: string
          nullable: true
        employment_position:
          type: string
          nullable: true
        signed_agreements:
          type: array
          minItems: 2
          description: |
            Audit trail for each regulated acknowledgement the user clicked.
            Must contain at least `investor_agreement` and
            `margin_disclosure_acknowledged`; non-US tax residents must
            additionally include `w8ben_certification`.
          items:
            type: object
            required:
              - type
              - signed_at
              - ip_address
            properties:
              type:
                type: string
                enum:
                  - investor_agreement
                  - margin_disclosure_acknowledged
                  - w8ben_certification
                example: investor_agreement
              signed_at:
                type: string
                format: date-time
                description: ISO-8601 timestamp when the user clicked Accept.
              ip_address:
                type: string
                description: Client IP address at the time of click.
        trusted_contact:
          $ref: '#/components/schemas/TrustedContact'
        metadata:
          type: object
          additionalProperties:
            type: string
    Account:
      $ref: '#/components/schemas/Investor'
    ComplianceStatus:
      description: |
        Compliance-workflow status returned by
        `GET /v1/investors/{investor_id}/compliance`. Wraps the latest
        workflow with envelope keys (`object: 'compliance_workflow'`,
        `livemode`). `status` is the Buildmarkets-native external vocab
        (`running` / `awaiting_review` / `approved` / `declined` /
        `suspended` / `expired`); `workflow_status` is the internal
        UPPER_CASE value retained for partners that want the raw enum.
      type: object
      required:
        - object
        - livemode
        - investor_id
        - workflow_status
        - workflow_type
        - checks
        - created_at
        - updated_at
      additionalProperties: true
      properties:
        object:
          type: string
          enum:
            - compliance_workflow
        livemode:
          type: boolean
        investor_id:
          type: string
          description: Prefixed public id of the investor.
          example: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
        workflow_status:
          type: string
          enum:
            - IN_PROGRESS
            - PENDING_REVIEW
            - APPROVED
            - REJECTED
            - SUSPENDED
            - EXPIRED
          description: Internal Alpaca-aligned UPPER_CASE workflow status.
          example: APPROVED
        status:
          type: string
          enum:
            - running
            - awaiting_review
            - approved
            - declined
            - suspended
            - expired
          description: Buildmarkets-native external workflow status.
          example: approved
        workflow_type:
          type: string
          enum:
            - kyc
            - kyb
            - periodic_review
          description: Type of compliance workflow.
          example: kyc
        risk_level:
          type: string
          enum:
            - low
            - medium
            - high
            - prohibited
            - null
          nullable: true
          description: Assessed risk level. Null while checks are still in progress.
          example: low
        checks:
          type: array
          description: Individual compliance check results.
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - identity_verification
                  - tax_id_verification
                  - screening
                  - risk_assessment
                  - business_verification
                description: The type of compliance check.
                example: identity_verification
              status:
                type: string
                enum:
                  - pending
                  - clear
                  - review_required
                  - failed
                  - error
                description: Result of the check.
                example: clear
              completed_at:
                type: string
                format: date-time
                nullable: true
                description: When this check completed. Null if still pending.
                example: '2026-03-15T10:05:00.000Z'
        created_at:
          type: string
          format: date-time
          description: When the compliance workflow was initiated.
          example: '2026-03-15T10:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          description: When the compliance workflow was last updated.
          example: '2026-03-15T10:05:00.000Z'
    DocumentUploadRequest:
      type: object
      required:
        - file
        - document_type
      properties:
        file:
          type: string
          format: binary
          description: The binary content of the document file (e.g., PDF or JPG).
        document_type:
          type: string
          enum:
            - id_verification
            - proof_of_address
            - w9_form
          description: The type of document being uploaded.
    DocumentResponse:
      description: |
        Document resource returned by `/v1/documents` endpoints. Uses the
        flat document shape: `document_id` is the public id, `owner_type` /
        `owner_id` are polymorphic ownership refs (INVESTOR / USER /
        TENANT). `purpose` indicates what the doc is for (KYC, KYB, EDD,
        TAX, FUNDING_VERIFICATION, AGREEMENT, OTHER).
      type: object
      required:
        - document_id
        - object
        - owner_type
        - owner_id
        - document_type
        - file_name
        - mime_type
        - status
        - uploaded_at
      properties:
        document_id:
          type: string
          example: doc_01j9x8m2k7qpzwv3t5r6y8n0ab
        object:
          type: string
          enum:
            - document
        owner_type:
          type: string
          enum:
            - tenant
            - investor
            - user
        owner_id:
          type: string
          description: UUID of the owning entity (raw, not prefix-encoded).
        purpose:
          type: string
          enum:
            - kyc
            - kyb
            - edd
            - tax
            - funding_verification
            - agreement
            - account_statement
            - trade_confirmation
            - other
          nullable: true
        document_type:
          type: string
          description: Free-form classifier (e.g. PASSPORT, BANK_STATEMENT, CIP_RESULT).
          example: id_verification
        file_name:
          type: string
          example: id-front.png
        mime_type:
          type: string
          example: image/png
        file_size:
          type: integer
          nullable: true
        status:
          type: string
          enum:
            - uploaded
            - processing
            - accepted
            - rejected
            - expired
        expires_at:
          type: string
          format: date-time
          nullable: true
        uploaded_at:
          type: string
          format: date-time
        metadata:
          type: object
          nullable: true
          additionalProperties: true
    OrderRequest:
      type: object
      required:
        - symbol
        - side
        - type
        - time_in_force
      properties:
        symbol:
          type: string
          description: The ticker symbol of the asset (e.g., AAPL).
          example: AAPL
        market:
          type: string
          description: Market identifier (e.g., "NASDAQ", "NYSE"). Optional.
          example: NASDAQ
        isin:
          type: string
          description: International Securities Identification Number. Optional.
          example: US0378331005
        figi:
          type: string
          description: Financial Instrument Global Identifier. Optional.
          example: BBG000B9XRY4
        class:
          type: string
          description: |
            Optional asset class hint (e.g. `bond`, `equity`, `treasury`).
            Mirrors the `class` field on the asset detail response. When
            `bond`, the resolver accepts the `symbol` field as a CUSIP on
            fallback — ticker collisions like ABBNVX (two distinct ABB
            Finance bonds sharing the same ticker) cannot be disambiguated
            by symbol alone.
          example: bond
        country:
          type: string
          description: Optional ISO country code (e.g. `us`) to help disambiguate cross-listed assets.
          example: us
        quantity:
          type: string
          description: Quantity of shares to trade (required if notional not provided, required for sell orders).
          example: '5'
        notional:
          type: string
          description: Dollar amount to trade (required if quantity not provided, only for buy market orders).
          example: '1000.00'
        side:
          type: string
          enum:
            - buy
            - sell
          description: Whether to buy or sell the asset.
          example: buy
        type:
          type: string
          enum:
            - market
            - limit
            - stop
            - stop_limit
            - trailing_stop
          description: |
            Order type:
            - market: Executes immediately at current market price
            - limit: Sets a specific price limit
            - stop: Stop loss order that triggers at stop price
            - stop_limit: Stop order with a limit price
            - trailing_stop: Trailing stop order
          example: limit
        time_in_force:
          type: string
          enum:
            - day
            - gtc
            - opg
            - cls
            - ioc
            - fok
          description: |
            How long the order remains active:
            - day: Expires at end of trading day
            - gtc: Good Till Cancelled - remains active until filled or cancelled
            - opg: Opening - executes at market open
            - cls: Closing - executes at market close
            - ioc: Immediate or Cancel - fills immediately or cancels
            - fok: Fill or Kill - fills completely or cancels
          example: day
        limit_price:
          type: string
          description: Price limit for limit/stop_limit orders (required when type is 'limit' or 'stop_limit').
          example: '175.00'
        stop_price:
          type: string
          description: Stop price for stop/stop_limit orders (required when type is 'stop' or 'stop_limit').
          example: '170.00'
        trail_percent:
          type: string
          description: Trail percentage for trailing stop orders (required for trailing_stop if trail_price not provided).
          example: '2.5'
        trail_price:
          type: string
          description: Trail price for trailing stop orders (required for trailing_stop if trail_percent not provided).
          example: '5.00'
        extended_hours:
          type: boolean
          default: false
          description: Whether to allow extended hours trading.
          example: false
        client_order_id:
          type: string
          description: Optional client-provided identifier for tracking the order.
          example: limitorder123
        commission:
          type: string
          description: Commission amount to charge (optional).
          example: '1.00'
        commission_type:
          type: string
          enum:
            - notional
            - per_share
            - bps
          description: |
            Commission calculation method:
            - notional: Charge commission on a per order basis (default)
            - per_share: Charge commission on a per-share/contract basis, pro rated
            - bps: Percent commission in basis points (up to 2 decimal places)
          example: notional
        wallet_currency:
          type: string
          enum:
            - USD
            - NGN
            - GBP
            - EUR
            - KES
          description: |
            Wallet currency to fund or receive trade proceeds. When omitted,
            defaults to USD (default wallet).
          example: NGN
    Order:
      description: |
        Trading order resource. Flat shape: `quantity` not `qty`,
        `failure_reason` not `reject_reason`, `investor_id` not `account_id`,
        Buildmarkets-native status vocab. Drops the custodian's `submitted_at` (the envelope
        `created` field is the canonical creation timestamp).
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            investor_id:
              type: string
              description: Prefixed public id of the investor.
              example: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
            symbol:
              type: string
              example: AAPL
            class:
              type: string
              description: Asset class name (e.g. equity, bond, etf).
              example: equity
            currency:
              type: string
              example: USD
            quantity:
              type: string
              description: Quantity of shares ordered (for quantity-based orders).
              example: '5'
            notional:
              type: string
              description: Notional amount ordered (for notional-based orders).
              example: '1000.00'
            side:
              type: string
              enum:
                - buy
                - sell
            type:
              type: string
              enum:
                - market
                - limit
                - stop
                - stop_limit
                - trailing_stop
            time_in_force:
              type: string
              description: |
                FIX-standard time-in-force; not Alpaca-coined.
              enum:
                - day
                - gtc
                - opg
                - cls
                - ioc
                - fok
            limit_price:
              type: string
            stop_price:
              type: string
            trail_percent:
              type: string
            trail_price:
              type: string
            extended_hours:
              type: boolean
            client_order_id:
              type: string
            status:
              type: string
              description: Buildmarkets-native order status.
              enum:
                - pending
                - filled
                - partial
                - cancelled
                - failed
              example: pending
            filled_quantity:
              type: string
              example: '0'
            remaining_quantity:
              type: string
              example: '5'
            average_price:
              type: string
            commission:
              type: string
            commission_type:
              type: string
              enum:
                - notional
                - per_share
                - bps
            filled_at:
              type: string
              format: date-time
              nullable: true
            cancelled_at:
              type: string
              format: date-time
              nullable: true
            failure_reason:
              type: string
              nullable: true
            settlement_date:
              type: string
              format: date
              nullable: true
              description: |
                Settlement date Alpaca will use for bond orders, when
                known. Buildmarkets does not specify or override this — Alpaca
                chooses based on the bond's subtype. Null for non-bond
                orders or until Alpaca confirms.
              example: '2026-05-22'
            bond:
              $ref: '#/components/schemas/OrderBondExecutionDetails'
    AssetSearchResult:
      type: object
      description: Asset information including metadata and current price data
      properties:
        id:
          type: string
          description: Unique identifier for the asset
          example: b0b6dd9d-8b9b-48b9-bbb8-bbbb49bb1bbb
        class:
          type: string
          enum:
            - equity
            - etf
            - bond
            - bill
            - note
            - mutual_fund
            - derivative
            - cryptocurrency
            - commodity
            - real_estate
            - cash
          description: |
            Canonical instrument class. Combine with `country` for the full picture
            (e.g. `class=equity` + `country=us` corresponds to a US stock).
          example: equity
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 country code (lower-case). Null for country-agnostic instruments.
          example: us
        asset_class:
          type: string
          enum:
            - us_equity
            - crypto
            - us_option
            - ng_equity
            - ng_bond
            - ng_etf
          deprecated: true
          description: |
            **Deprecated.** Combined legacy classifier. Use `class` + `country` instead.
            Populated for backwards-compat during Phase 1 of the asset-class refactor;
            scheduled for removal once partners migrate.
          example: us_equity
        market:
          type: string
          description: |
            Market/exchange code (ISO 10383 MIC):
            - XNAS: NASDAQ
            - XNYS: NYSE
            - BATS: BATS Global Markets
            - ARCA: NYSE Arca
            - OTC: OTC Markets
            - XNSA: Nigerian Stock Exchange
          example: XNAS
        symbol:
          type: string
          description: Asset ticker symbol. For fixed-income assets this is the bond ticker when Alpaca provides one (corporates, e.g. "ABBNVX"); treasuries, which have no ticker, fall back to the CUSIP. The CUSIP is always available as `id` and under `bond.cusip`.
          example: AAPL
        name:
          type: string
          description: Full name of the asset
          example: Apple Inc.
        status:
          type: string
          enum:
            - active
            - inactive
          description: Asset status
          example: active
        tradable:
          type: boolean
          description: Whether the asset is currently tradable
          example: true
        marginable:
          type: boolean
          description: Whether the asset can be traded on margin
          example: true
        shortable:
          type: boolean
          description: Whether the asset can be shorted
          example: true
        easy_to_borrow:
          type: boolean
          description: Whether the asset is easy to borrow for shorting
          example: true
        fractionable:
          type: boolean
          description: Whether the asset can be traded in fractional shares
          example: true
        fractional_eh_enabled:
          type: boolean
          description: Whether the asset supports fractional trading during extended hours (pre/post market)
          example: true
        price:
          type: number
          description: Current/last traded price (optional, when available)
          example: 178.5
        change:
          type: number
          description: Price change from previous close (optional)
          example: 1.5
        changePercent:
          type: number
          description: Percentage change from previous close (optional)
          example: 0.85
        previousClose:
          type: number
          description: Previous day's closing price (optional)
          example: 177
        bidPrice:
          type: number
          description: Current best bid price (optional)
          example: 178.48
        askPrice:
          type: number
          description: Current best ask price (optional)
          example: 178.52
        currency:
          type: string
          description: Currency code for asset pricing (ISO 4217)
          example: USD
        price_timestamp:
          type: string
          format: date-time
          nullable: true
          description: When the price was recorded by its source. Use this to judge price recency.
          example: '2026-05-29T20:00:00.000Z'
        last_synced_at:
          type: string
          format: date-time
          nullable: true
          description: When the asset row was last refreshed from its provider. Null for live (never-persisted) results.
          example: '2026-06-01T02:12:31.000Z'
        bond:
          $ref: '#/components/schemas/BondAttributes'
      required:
        - id
        - class
        - country
        - market
        - symbol
        - name
        - status
        - tradable
        - marginable
        - shortable
        - easy_to_borrow
        - fractionable
        - fractional_eh_enabled
        - currency
    ChartResponse:
      type: object
      properties:
        symbol:
          type: string
          description: Asset ticker symbol
          example: AAPL
        bars:
          type: array
          items:
            $ref: '#/components/schemas/ChartBar'
          description: Array of historical bars
        nextPageToken:
          type: string
          nullable: true
          description: Token for pagination to get next page of results.
          example: eyJpZCI6IjIwMjUtMDEtMTVUMTY6MDA6MDBaIiwiY3JlYXRlZEF0IjoiMjAyNS0wMS0xNVQxNjowMDowMFoifQ
      required:
        - symbol
        - bars
    ChartBar:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Bar timestamp (ISO 8601 format)
          example: '2025-01-15T16:00:00Z'
        open:
          type: number
          description: Opening price
          example: 150.25
        high:
          type: number
          description: Highest price
          example: 152.5
        low:
          type: number
          description: Lowest price
          example: 149.8
        close:
          type: number
          description: Closing price
          example: 151.75
        volume:
          type: integer
          description: Trading volume
          example: 5000000
        tradeCount:
          type: integer
          description: Number of trades (optional)
          example: 12500
        volumeWeightedAveragePrice:
          type: number
          description: Volume weighted average price (optional)
          example: 151.2
      required:
        - timestamp
        - open
        - high
        - low
        - close
        - volume
    Wallet:
      description: |
        A wallet holds a balance for a specific currency within an investor
        account. Envelope-wrapped.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          required:
            - currency
            - balance
            - available_balance
            - reserved_balance
            - status
          properties:
            currency:
              type: string
              minLength: 3
              maxLength: 3
              example: USD
            balance:
              type: string
              description: Total balance (available + reserved).
            available_balance:
              type: string
            reserved_balance:
              type: string
            cash_withdrawable:
              type: string
              description: Amount of cash available for withdrawal from the custodian brokerage account. Defaults to "0" when no custodian account exists yet.
              example: '5000.00'
            buying_power:
              type: string
              description: Available buying power from the custodian brokerage account. Defaults to "0" when no custodian account exists yet.
              example: '10000.00'
            equity:
              type: string
              description: Total equity value from the custodian brokerage account. Defaults to "0" when no custodian account exists yet.
              example: '8500.00'
            status:
              type: string
              enum:
                - active
                - suspended
                - closed
    Transaction:
      description: |
        A cash movement on the investor's account: a `deposit`, a
        `withdrawal`, a `buy` / `sell` trade settlement from a filled
        order, or an `activity` (non-trade account activity — dividends,
        fees, interest, fixed-income maturity, journals, withholdings,
        corporate actions). Envelope-wrapped.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          required:
            - investor_id
            - wallet_id
            - type
            - status
            - amount
            - currency
            - method
          properties:
            investor_id:
              type: string
              description: Prefixed public id of the owning investor.
            wallet_id:
              type: string
              description: |
                Prefixed public id of the wallet. Empty string for
                `activity` rows (custodian activities aren't scoped to
                a Buildmarkets wallet).
            type:
              type: string
              enum:
                - deposit
                - withdrawal
                - buy
                - sell
                - activity
            status:
              type: string
              description: |
                Funding status for deposit/withdrawal, `completed` for
                trade cash movements, or the lowercased activity status
                (typically `executed`) for activity rows.
            amount:
              type: string
              description: |
                Positive amount in wallet currency for deposit / withdrawal /
                trade rows. Activity rows carry the signed net amount
                (positive = credit, negative = debit).
            currency:
              type: string
              minLength: 3
              maxLength: 3
            method:
              type: string
              description: |
                Funding rail (e.g. `ach`, `wire`), `order` for buy/sell
                cash, or `activity` for custodian activity rows.
            description:
              type: string
              nullable: true
            completed_at:
              type: string
              format: date-time
              nullable: true
            failed_at:
              type: string
              format: date-time
              nullable: true
            failure_reason:
              type: string
              nullable: true
            activity_type:
              type: string
              description: |
                Activity tag (`FIMAT`, `CDIV`, `SDIV`, `DIVNRA`, `FEE`,
                `INT`, `JNLC`, `JNLS`, `ACATC`, `ACATS`, corporate-action
                tags, etc.). Present only when `type === activity`.
            activity_subtype:
              type: string
              nullable: true
              description: Activity subtype, when one applies (e.g. `REG`, `TAF`, `OCC`). Present only when `type === activity`.
            symbol:
              type: string
              description: |
                Ticker symbol of the asset traded. Present only when
                `type` is `buy` or `sell`, sourced from the originating
                order.
              example: AAPL
            quantity:
              type: string
              description: |
                Requested order quantity (decimal string, up to 9 d.p.).
                Present only for `buy` / `sell` rows.
              example: '5'
            filled_quantity:
              type: string
              description: |
                Filled quantity (decimal string, up to 9 d.p.). Present
                only for `buy` / `sell` rows.
              example: '5'
            average_price:
              type: string
              description: |
                Average fill price per share in the wallet currency.
                Present only for `buy` / `sell` rows.
              example: '151.05'
            notional:
              type: string
              description: |
                Notional / cost basis of the trade in the wallet
                currency (gross, before commission). Present only for
                `buy` / `sell` rows.
              example: '755.25'
            commission:
              type: string
              description: |
                Commission charged on the trade in the wallet currency.
                Present only for `buy` / `sell` rows.
              example: '0.00'
            net_amount:
              type: string
              description: |
                Net cash impact in the wallet currency after commission
                (positive for buy debits, positive for sell credits).
                Present only for `buy` / `sell` rows.
              example: '755.25'
    Position:
      description: Envelope-wrapped position resource.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            investor_id:
              type: string
              description: Prefixed public id of the owning investor.
              example: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
            symbol:
              type: string
              example: AAPL
            asset_id:
              type: string
            class:
              type: string
              enum:
                - equity
                - etf
                - bond
                - bill
                - note
                - mutual_fund
                - derivative
                - cryptocurrency
                - commodity
                - real_estate
                - cash
              description: Canonical instrument class of the held asset.
              example: equity
            country:
              type: string
              nullable: true
              description: ISO 3166-1 alpha-2 country code (lower-case). Null for country-agnostic instruments.
              example: us
            asset_class:
              type: string
              deprecated: true
              nullable: true
              description: |
                **Deprecated.** Combined legacy classifier (`us_equity`, `ng_bond`, ...).
                Populated for backwards-compat during Phase 1 of the asset-class refactor.
                Use `class` + `country` instead.
              example: us_equity
            currency:
              type: string
              example: USD
            quantity:
              type: string
              example: '10.5'
            average_cost_basis:
              type: string
              example: '175.50'
            total_cost_basis:
              type: string
              example: '1842.75'
            current_price:
              type: string
              example: '180.00'
            market_value:
              type: string
              example: '1890.00'
            unrealized_pl:
              type: string
              example: '47.25'
            unrealized_pl_percent:
              type: string
              example: '2.56'
            price_source:
              type: string
              enum:
                - ALPACA
                - NAYA
                - DATABASE
                - UNAVAILABLE
            price_confidence:
              type: string
              enum:
                - REAL_TIME
                - DELAYED
                - END_OF_DAY
                - STALE
                - UNAVAILABLE
            price_timestamp:
              type: string
              format: date-time
              nullable: true
            last_transaction_at:
              type: string
              format: date-time
              nullable: true
            updated_at:
              type: string
              format: date-time
    LinkTokenResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            link_token:
              type: string
              description: Plaid Link token for initializing Plaid Link
              example: link-production-abc123def456
            hosted_link_url:
              type: string
              format: uri
              nullable: true
              description: |
                Hosted Link URL (only present when enable_hosted_link was set to true).
                Direct users to this URL to start the Plaid-hosted bank linking flow.
                After completion, Plaid redirects back to your application.
              example: https://hosted.plaid.com/link/abc123def456
    FundingSource:
      description: |
        A connected funding source (bank account) that can be used for
        deposits and withdrawals. Envelope-wrapped.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            type:
              type: string
              enum:
                - plaid
                - manual
            status:
              type: string
              enum:
                - active
                - disconnected
                - error
            bank_name:
              type: string
              nullable: true
            mask:
              type: string
              nullable: true
            provider_id:
              type: string
              description: Plaid `item_id` for Plaid sources.
            account_name:
              type: string
              nullable: true
            account_type:
              type: string
              nullable: true
            account_subtype:
              type: string
              nullable: true
            account_holder_name:
              type: string
              nullable: true
              description: Legal name of the account holder.
            bank_account_type:
              type: string
              nullable: true
              enum:
                - CHECKING
                - SAVINGS
              description: Type of bank account.
            account_number:
              type: string
              nullable: true
              description: Masked account number (last 4 digits visible).
            routing_number:
              type: string
              nullable: true
              description: Bank routing number (ABA for US banks).
            swift_code:
              type: string
              nullable: true
              description: SWIFT/BIC code for international wires.
            iban:
              type: string
              nullable: true
              description: Masked IBAN (last 4 digits visible).
            wire_routing_kind:
              type: string
              nullable: true
              description: 'Routing code type: aba, sort_code, ifsc, etc.'
            bank_code:
              type: string
              nullable: true
              description: Bank-specific code (used in some regions).
            beneficiary_address:
              type: string
              nullable: true
              description: Beneficiary address as a single string (legacy field).
            address_line_1:
              type: string
              nullable: true
              description: Street address for wire payout beneficiary.
            payout_country:
              type: string
              nullable: true
              description: ISO 3166-1 alpha-2 country code for wire payout beneficiary.
            payout_currency:
              type: string
              nullable: true
              description: ISO 4217 currency code for wire payout beneficiary.
            payout_city:
              type: string
              nullable: true
              description: City for wire payout beneficiary.
            payout_region:
              type: string
              nullable: true
              description: State or region for wire payout beneficiary.
            payout_postal_code:
              type: string
              nullable: true
              description: Postal code for wire payout beneficiary.
            wire_payout_complete:
              type: boolean
              description: Whether enough fields are populated for a wire payout via the custodian.
            metadata:
              type: object
              description: Arbitrary key-value metadata attached to the funding source.
            updated_at:
              type: string
              format: date-time
    ConnectFundingSourceRequest:
      oneOf:
        - $ref: '#/components/schemas/ConnectPlaidRequest'
        - $ref: '#/components/schemas/ConnectManualRequest'
      discriminator:
        propertyName: type
        mapping:
          plaid: '#/components/schemas/ConnectPlaidRequest'
          manual: '#/components/schemas/ConnectManualRequest'
    Webhook:
      description: Envelope-wrapped webhook subscription.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          required:
            - event_types
            - name
            - url
          properties:
            event_types:
              type: array
              items:
                $ref: '#/components/schemas/EventType'
            name:
              type: string
            url:
              type: string
              format: uri
            description:
              type: string
              nullable: true
            status:
              type: string
              enum:
                - ACTIVE
                - INACTIVE
              default: ACTIVE
            secret:
              type: string
              nullable: true
              description: Secret for webhook signature verification (HMAC).
            updated_at:
              type: string
              format: date-time
    CreateWebhookRequest:
      type: object
      required:
        - eventTypeNames
        - name
        - url
      properties:
        eventTypeNames:
          type: array
          items:
            type: string
          description: Array of webhook event type names (at least one required)
        name:
          type: string
          description: Human-readable name for the webhook
        url:
          type: string
          format: uri
          description: Webhook URL endpoint
        description:
          type: string
          nullable: true
          description: Optional description for the webhook
    EventType:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Dot-notation name of the event (e.g., "order.filled")
        category:
          type: string
          description: Event category (e.g., "order", "kyc")
        description:
          type: string
          description: Human-readable description of the event
        displayName:
          type: string
          nullable: true
          description: Human-readable name for display
    CreateDepositRequest:
      type: object
      required:
        - amount
        - method
      properties:
        amount:
          type: string
          pattern: ^\d+(\.\d{1,2})?$
          description: The deposit amount as a decimal string with up to 2 decimal places.
          example: '1000.00'
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
          description: The currency code (ISO 4217). Defaults to USD.
          example: USD
        method:
          type: string
          enum:
            - ach
            - manual_bank_transfer
            - wire
            - international_wire
            - mobile_money
            - card
          description: |
            The funding method for the deposit:
            - `ach`: ACH bank transfer
            - `manual_bank_transfer`: Manual wire/ACH to Buildmarkets' bank account
            - `wire`: Wire transfer
            - `international_wire`: International wire transfer
            - `mobile_money`: Mobile money collection (e.g. MTN MoMo, Airtel Money)
            - `card`: Debit/credit card payment
          example: manual_bank_transfer
        description:
          type: string
          maxLength: 500
          description: Optional description for the deposit.
          example: Initial funding for investment account
        metadata:
          type: object
          description: |
            Method-specific options passed to the funding provider. Fields vary by method:
            - `mobile_money`: `phone` (required, E.164) — the mobile money number to debit.
            - `card`: `redirect_url` (recommended) — URL to redirect after 3DS/payment page.
          properties:
            phone:
              type: string
              description: Mobile money phone number in E.164 format. Required for `mobile_money` deposits.
              example: '+233123456789'
            redirect_url:
              type: string
              format: uri
              description: Redirect URL after card payment. Recommended for `card` deposits.
              example: https://app.example.com/deposit/callback
        manual_options:
          $ref: '#/components/schemas/ManualDepositOptions'
        wire_options:
          $ref: '#/components/schemas/WireDepositOptions'
    DepositResponse:
      description: Envelope-wrapped deposit resource.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            investor_id:
              type: string
              description: Prefixed public id of the owning investor.
              example: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
            wallet_id:
              type: string
              description: Prefixed public id of the destination wallet.
              example: wlt_01j9x8m2k7qpzwv3t5r6y8n0cd
            funding_source_id:
              type: string
              nullable: true
              description: Prefixed public id of the funding source (when applicable).
            method:
              type: string
              enum:
                - ach
                - manual_bank_transfer
                - wire
                - international_wire
            status:
              type: string
              enum:
                - pending
                - processing
                - completed
                - cancelled
                - failed
              description: Buildmarkets-native transfer status.
            amount:
              type: string
            currency:
              type: string
            description:
              type: string
              nullable: true
            method_details:
              type: object
              nullable: true
              description: |
                Provider-specific transfer details. Shape varies by method:
                - **ach**: `{ provider_name, transfer_id, alpaca_status }`
                - **manual_bank_transfer**: `{ reference_code, bank_details: { bank_name, bank_address, account_name, account_number, routing_number, swift_code, instructions }, expires_at }`
                - **international_wire**: `{ provider_name, funding_details }`
              properties:
                provider_name:
                  type: string
                  description: Name of the funding provider (e.g. "alpaca").
                transfer_id:
                  type: string
                  description: External provider transfer ID. Present for ACH deposits.
                alpaca_status:
                  type: string
                  description: Alpaca-native transfer status (e.g. QUEUED, APPROVAL_PENDING, COMPLETE). Present for ACH deposits.
                reference_code:
                  type: string
                  description: Unique reference code for manual bank transfers.
                bank_details:
                  type: object
                  nullable: true
                  description: Bank account details for manual bank transfers.
                  properties:
                    bank_name:
                      type: string
                    bank_address:
                      type: string
                      nullable: true
                    account_name:
                      type: string
                    account_number:
                      type: string
                      description: Masked account number (e.g. ****1234).
                    routing_number:
                      type: string
                    swift_code:
                      type: string
                      nullable: true
                    instructions:
                      type: string
                expires_at:
                  type: string
                  description: ISO date-time after which a manual bank transfer deposit reference expires.
            initiated_at:
              type: string
              format: date-time
              nullable: true
            received_at:
              type: string
              format: date-time
              nullable: true
            completed_at:
              type: string
              format: date-time
              nullable: true
            expires_at:
              type: string
              format: date-time
              nullable: true
            failure_reason:
              type: string
              nullable: true
    DepositListResponse:
      description: List envelope of deposit resources.
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DepositResponse'
    CreateWithdrawalRequest:
      type: object
      required:
        - amount
        - method
      properties:
        amount:
          type: string
          pattern: ^\d+(\.\d{1,2})?$
          description: The withdrawal amount as a decimal string with up to 2 decimal places.
          example: '500.00'
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
          description: The currency code (ISO 4217). Defaults to USD.
          example: USD
        method:
          type: string
          enum:
            - ach
            - wire
            - international_wire
          description: |
            The funding method for the withdrawal:
            - `ach`: ACH bank transfer
            - `wire`: Wire transfer
            - `international_wire`: International wire transfer
          example: ach
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Optional description for the withdrawal.
          example: Monthly withdrawal to checking account
        funding_source_id:
          type: string
          description: |
            Prefixed public id (`fs_…`) or UUID of the investor's active funding source.
            Required when `method` is `ach`, `wire`, or `international_wire`; wire payouts use the funding source's beneficiary profile.
        wire_options:
          $ref: '#/components/schemas/WireWithdrawalOptions'
    WithdrawalResponse:
      description: Envelope-wrapped withdrawal resource.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            investor_id:
              type: string
              description: Prefixed public id of the owning investor.
            wallet_id:
              type: string
              description: Prefixed public id of the source wallet.
            funding_source_id:
              type: string
              nullable: true
            method:
              type: string
              enum:
                - ach
                - wire
                - international_wire
            status:
              type: string
              enum:
                - pending
                - processing
                - completed
                - cancelled
                - failed
              description: Buildmarkets-native transfer status.
            amount:
              type: string
            currency:
              type: string
            description:
              type: string
              nullable: true
            method_details:
              type: object
              nullable: true
              description: |
                Provider-specific transfer details. Shape varies by method:
                - **ach**: `{ provider_name, transfer_id, alpaca_status }`
                - **international_wire**: `{ provider_name, recipient_bank_action, alpaca_bank_id }`
              properties:
                provider_name:
                  type: string
                  description: Name of the funding provider (e.g. "alpaca").
                transfer_id:
                  type: string
                  description: External provider transfer ID.
                alpaca_status:
                  type: string
                  description: Alpaca-native transfer status (e.g. QUEUED, APPROVAL_PENDING, COMPLETE).
            destination_details:
              type: object
              nullable: true
            initiated_at:
              type: string
              format: date-time
              nullable: true
            completed_at:
              type: string
              format: date-time
              nullable: true
            failure_reason:
              type: string
              nullable: true
    WithdrawalListResponse:
      description: List envelope of withdrawal resources.
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/WithdrawalResponse'
    SubmitComplianceCheckRequest:
      type: object
      required:
        - workflow_id
        - check_type
        - provider_payload
      properties:
        workflow_id:
          type: string
          description: The compliance workflow ID returned in the `compliance_checks` array during account creation.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        check_type:
          type: string
          enum:
            - identity_verification
            - tax_id_verification
            - screening
            - business_verification
          description: |
            The type of compliance check being submitted. Must match one of the checks returned during account creation.
          example: identity_verification
        provider_payload:
          type: object
          additionalProperties: true
          description: |
            Provider-specific callback/completion payload. Contents depend on the provider:
            - **Persona**: Include the inquiry/transaction completion data (e.g., `event_type`, `inquiry_id`, `status`).
            - **Dojah**: Include the widget completion data (e.g., `verification_status`, `reference_id`).
    ComplianceWorkflowResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the compliance workflow.
        status:
          type: string
          enum:
            - in_progress
            - pending_review
            - approved
            - rejected
            - suspended
            - expired
          description: |
            Current status of the workflow:
            - `in_progress`: One or more checks are still pending.
            - `pending_review`: All checks complete, but manual review is needed (HIGH risk).
            - `approved`: All checks passed and workflow is approved.
            - `rejected`: One or more checks failed or risk level is PROHIBITED.
        risk_level:
          type: string
          nullable: true
          enum:
            - low
            - medium
            - high
            - prohibited
          description: Assessed risk level after all checks complete.
        checks:
          type: array
          items:
            type: object
            properties:
              check_type:
                type: string
              status:
                type: string
              provider:
                type: string
              external_id:
                type: string
                nullable: true
              started_at:
                type: string
                format: date-time
                nullable: true
              completed_at:
                type: string
                format: date-time
                nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: A custom error code for troubleshooting.
          example: BLUM-400-001
        message:
          type: string
          description: Human-readable error message.
          example: Invalid quantity. Must be a positive integer.
    MarketResponse:
      type: object
      properties:
        code:
          type: string
          description: ISO 10383 MIC code
          example: XNSA
        common_code:
          type: string
          nullable: true
          description: Human-friendly market code
          example: NGX
        name:
          type: string
          description: Full market name
          example: Nigerian Stock Exchange
        country:
          type: string
          description: ISO 2-letter country code
          example: NG
        currency:
          type: string
          description: Primary trading currency (ISO 4217)
          example: NGN
        timezone:
          type: string
          description: IANA timezone
          example: Africa/Lagos
        status:
          type: string
          enum:
            - active
            - inactive
            - holiday
          example: active
        trading_hours:
          type: object
          nullable: true
          properties:
            open:
              type: string
              example: '10:00'
            close:
              type: string
              example: '14:30'
        extended_hours_supported:
          type: boolean
          description: Whether the venue supports pre/post-market trading
        current_status:
          type: object
          nullable: true
          description: Current session status (best-effort; omitted on enrichment failure)
          properties:
            trading_session_status:
              type: string
              enum:
                - PRE_OPEN
                - OPEN
                - EXTENDED
                - HALTED
                - PRE_CLOSE
                - CLOSED
                - REQUEST_REJECTED
            is_open:
              type: boolean
            next_open:
              type: string
              format: date-time
              nullable: true
            next_close:
              type: string
              format: date-time
              nullable: true
      required:
        - code
        - name
        - country
        - currency
        - timezone
        - status
        - extendedHoursSupported
    MarketStatusResponse:
      type: object
      description: Full market state. Aligns with FIX TradSesStatus(340) plus an EXTENDED state for pre/post-market.
      properties:
        code:
          type: string
          example: XNAS
        common_code:
          type: string
          nullable: true
          example: NASDAQ
        name:
          type: string
        timezone:
          type: string
          example: America/New_York
        trading_session_status:
          type: string
          enum:
            - PRE_OPEN
            - OPEN
            - EXTENDED
            - HALTED
            - PRE_CLOSE
            - CLOSED
            - REQUEST_REJECTED
        is_open:
          type: boolean
          description: True only when trading_session_status is OPEN
        next_open:
          type: string
          format: date-time
          nullable: true
        next_close:
          type: string
          format: date-time
          nullable: true
        today:
          type: object
          properties:
            pre_open:
              type: string
              format: date-time
              nullable: true
            regular_open:
              type: string
              format: date-time
              nullable: true
            regular_close:
              type: string
              format: date-time
              nullable: true
            post_close:
              type: string
              format: date-time
              nullable: true
            is_holiday:
              type: boolean
            holiday_name:
              type: string
              nullable: true
            is_early_close:
              type: boolean
            early_close_at:
              type: string
              format: date-time
              nullable: true
        active_halts:
          type: array
          items:
            $ref: '#/components/schemas/MarketHaltResponse'
        extended_hours_supported:
          type: boolean
      required:
        - code
        - timezone
        - trading_session_status
        - is_open
        - today
        - active_halts
        - extended_hours_supported
    MarketCalendarResponse:
      type: object
      properties:
        code:
          type: string
          example: XNAS
        common_code:
          type: string
          nullable: true
          example: NASDAQ
        year:
          type: integer
          example: 2026
        trading_hours:
          type: object
          nullable: true
          properties:
            open:
              type: string
              example: '09:30'
            close:
              type: string
              example: '16:00'
        holidays:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                example: '2026-07-03'
              name:
                type: string
                example: Independence Day
              type:
                type: string
                enum:
                  - FULL
                  - EARLY
                description: FULL = market closed all day, EARLY = early close
              early_close:
                type: string
                nullable: true
                description: Early close time (only for EARLY type)
                example: '13:00'
            required:
              - date
              - name
              - type
      required:
        - code
        - year
        - holidays
    QuoteResponse:
      type: object
      properties:
        symbol:
          type: string
          example: AAPL
        market:
          type: string
          description: MIC code of the market
          example: XNAS
        market_name:
          type: string
          description: Common market name
          example: NASDAQ
        price:
          type: number
          description: |
            Primary price. For equities, the last traded price. For bonds,
            the clean price quoted as percentage of par (e.g. `99.875`
            means 99.875% of face value).
          example: 185.5
        bid_price:
          type: number
          description: Current best bid price. For bonds, % of par.
        ask_price:
          type: number
          description: Current best ask price. For bonds, % of par.
        currency:
          type: string
          description: Price currency (ISO 4217)
          example: USD
        timestamp:
          type: string
          format: date-time
          description: When the price was recorded
        source:
          type: string
          description: Data provider
          enum:
            - ALPACA
            - NAYA
            - DATABASE
        confidence:
          type: string
          description: Price data freshness
          enum:
            - REAL_TIME
            - DELAYED
            - END_OF_DAY
            - STALE
            - UNAVAILABLE
        bond:
          $ref: '#/components/schemas/BondPriceDetails'
      required:
        - symbol
        - market
        - price
        - currency
        - timestamp
        - source
        - confidence
    BarsResponse:
      type: object
      properties:
        symbol:
          type: string
          example: AAPL
        market:
          type: string
          example: XNAS
        currency:
          type: string
          description: Price currency (ISO 4217)
          example: USD
        timeframe:
          type: string
          example: 1Day
        bars:
          type: array
          items:
            $ref: '#/components/schemas/BarData'
        data_quality:
          type: object
          nullable: true
          description: Present when the data provider has known limitations
          properties:
            provider:
              type: string
              example: NAYA
            limitations:
              type: array
              items:
                type: string
              example:
                - Only daily closing prices available; open, high, low values reflect the closing price
      required:
        - symbol
        - market
        - currency
        - timeframe
        - bars
    BarData:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
        vwap:
          type: number
          description: Volume-weighted average price
        trade_count:
          type: integer
          description: Number of trades in the bar
      required:
        - timestamp
        - open
        - high
        - low
        - close
        - volume
    SnapshotResponse:
      type: object
      properties:
        symbol:
          type: string
          example: AAPL
        market:
          type: string
          example: XNAS
        currency:
          type: string
          example: USD
        latest_trade:
          type: object
          nullable: true
          properties:
            price:
              type: number
            size:
              type: number
            timestamp:
              type: string
              format: date-time
            exchange:
              type: string
        latest_quote:
          type: object
          nullable: true
          properties:
            bid_price:
              type: number
            ask_price:
              type: number
            bid_size:
              type: number
            ask_size:
              type: number
            timestamp:
              type: string
              format: date-time
        daily_bar:
          type: object
          nullable: true
          properties:
            open:
              type: number
            high:
              type: number
            low:
              type: number
            close:
              type: number
            volume:
              type: number
            vwap:
              type: number
            date:
              type: string
              format: date
        prev_daily_bar:
          type: object
          nullable: true
          properties:
            close:
              type: number
            date:
              type: string
              format: date
        change:
          type: number
          description: Price change from previous close
        change_percent:
          type: number
          description: Percentage change from previous close
        source:
          type: string
          enum:
            - ALPACA
            - NAYA
            - DATABASE
        confidence:
          type: string
          enum:
