      summary: Create a Plaid Link token
      description: |
        Creates a Plaid Link token for initializing Plaid Link.

        **Two integration options:**
        1. **SDK Integration** (default): use the `link_token` with Plaid Link SDK in your mobile/web app.
        2. **Hosted Link**: set `enable_hosted_link: true` to get a `hosted_link_url` that redirects users to a Plaid-hosted page. Users complete the flow on Plaid's site and are redirected back to your application.
      operationId: createPlaidLinkToken
