  /disclosures:
    get:
      tags:
        - Disclosures
      summary: List disclosures
      description: |
        Returns every disclosure Buildmarkets surfaces to end-users — verbatim
        Alpaca regulated copy, Alpaca's reference PDF library (including
        the High Yield Cash / FDIC Bank Sweep variants), and Buildmarkets'
        platform disclosures.

        **No authentication required** — partners can hit this endpoint
        from un-authenticated screens (signup, onboarding intro) to
        render disclosure copy.

        Partners should cache the response by `version` per disclosure
        and re-fetch on each session boundary; when a `version` advances
        the partner must re-prompt the user for acknowledgement.

        The `text` field on `kind: verbatim_text` disclosures is
        regulated word-for-word copy. **Do not modify, translate, or
        truncate it.** Translations are permitted only if they match
        the source language word-for-word.
      operationId: listDisclosures
      security: []
      parameters:
        - name: source
          in: query
          required: false
          description: Filter by source. Omit for all.
          schema:
            type: string
            enum:
              - alpaca
              - bluum
        - name: route
          in: query
          required: false
          description: |
            Filter by onboarding route. `us` returns disclosures whose route
            is `us` OR `all`; same for `international`. `all` (default)
            returns every disclosure.
          schema:
            type: string
            enum:
              - all
              - us
              - international
            default: all
        - name: step
          in: query
          required: false
          description: |
            Filter to the disclosures the partner should surface at a
            specific point in the onboarding / enrollment flow.
          schema:
            type: string
            enum:
              - step_6_affiliations
              - step_7_w8_certification
              - step_9_broker_agreements
              - step_12_post_account
              - step_hyc_enrollment
              - step_fixed_income_enrollment
              - platform_signup
        - name: requires_acknowledgement
          in: query
          required: false
          description: |
            `true` returns only disclosures the partner must capture an
            explicit acknowledgement for (checkbox / "I Agree" button).
            `false` returns reference-only disclosures.
          schema:
            type: boolean
      responses:
        '200':
          description: Disclosure list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Disclosure'
              examples:
                hyc:
                  summary: HYC enrollment disclosures (filtered)
                  value:
                    object: list
                    url: /v1/disclosures
                    has_more: false
                    data:
                      - object: disclosure
                        id: hyc_non_shariah_new_customer_ack
                        version: '2026-05-23'
                        source: alpaca
                        kind: verbatim_text
                        route: us
                        step: step_hyc_enrollment
                        title: HYC enrollment acknowledgement — new customer (Non-Shariah)
                        text: |
                          I have read, understood, and agree to be bound by Alpaca Securities LLC and Buildmarkets Invest LLC account terms, and all other terms, disclosures and disclaimers applicable to me, as referenced in the Alpaca Customer Agreement. I also acknowledge that I have been presented the Alpaca Securities LLC Bank Sweep Program Terms and Conditions.
                        requires_acknowledgement: true
                        agreement_key: null
                        source_reference: Tech Sign Off - Buildmarkets.xlsx, High Yield Cash 1.0 (new customer onboarding)
  /disclosures/{disclosure_id}:
    get:
      tags:
        - Disclosures
      summary: Get a single disclosure
      description: |
        Retrieve one disclosure by its stable `id`. Use this when the
        partner has cached an acceptance against a specific disclosure id
        and needs to refresh the copy/version.

        No authentication required.
      operationId: getDisclosure
      security: []
      parameters:
        - name: disclosure_id
          in: path
          required: true
          schema:
            type: string
          description: |
            The disclosure's stable id (e.g. `hyc_non_shariah_new_customer_ack`,
            `investor_agreement_ack`, `alpaca_library_form_crs`).
      responses:
        '200':
          description: Disclosure resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Disclosure'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /investors/{investor_id}/disclosures/acceptances:
    post:
      tags:
        - Disclosures
      summary: Record a disclosure acceptance
      description: |
        Records an end-user's explicit acceptance of a disclosure (the
        "checkbox click"). Used when the partner is recording the
        acknowledgement out-of-band from `POST /v1/investors` —
        for example, when the user accepts a disclosure in-app after
        their account was already created, or when re-prompting after
        a `version` bump.

        For Alpaca-required acknowledgements that map to an Alpaca
        agreement key (`customer_agreement`, `w8ben_certification`),
        prefer submitting via the `signed_agreements[]` array on
        `POST /v1/investors` so Alpaca receives the acceptance at
        account-create time. Use this endpoint for post-hoc acceptances
        or Buildmarkets-only disclosures.
      operationId: recordDisclosureAcceptance
      parameters:
        - $ref: '#/components/parameters/components-parameters-InvestorIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - disclosure_id
              properties:
                disclosure_id:
                  type: string
                  description: Stable id from the disclosure registry.
                  example: hyc_non_shariah_new_customer_ack
                version:
                  type: string
                  description: |
                    Version the user is acknowledging. If omitted the
                    server stamps the current version from the registry.
                  example: '2026-05-23'
                signed_at:
                  type: string
                  format: date-time
                  description: ISO-8601 timestamp of the click. Defaults to server time.
                ip_address:
                  type: string
                  description: Client IP that performed the click. Defaults to request IP.
                user_agent:
                  type: string
                  description: Client user-agent string. Defaults to the request User-Agent header.
                actor_ref:
                  type: string
                  description: Partner-defined reference for the acting user (e.g. session id, dashboard user id).
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              hyc_enrollment:
                summary: User opted in to the FDIC Sweep program
                value:
                  disclosure_id: hyc_non_shariah_new_customer_ack
                  signed_at: '2026-05-23T15:04:11Z'
              advisory:
                summary: User accepted Buildmarkets' Form ADV disclosure
