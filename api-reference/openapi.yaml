    RiskAssessmentListResponse:
      description: List envelope of RiskAssessment resources.
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RiskAssessment'
    RiskAssessmentSummary:
