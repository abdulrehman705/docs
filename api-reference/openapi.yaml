  /investors/{investor_id}/cash-sweep/enroll:
    post:
      tags:
        - Cash Sweep
      summary: Enroll in cash sweep
      description: |
        Enroll an investor's brokerage account in the High Yield Cash (HYC) / FDIC
        Bank Sweep program. The account must be ACTIVE, fully-disclosed, and have a
        customer agreement at or above the minimum required version.

        Required disclosures can be accepted inline via `disclosure_acceptance`, or
        pre-recorded via `POST /v1/investors/{investor_id}/disclosures/acceptances`.
        If disclosures are missing and `disclosure_acceptance` is not provided, the
        endpoint returns 400 with the list of required disclosure IDs and their text.
      operationId: enrollCashSweep
      parameters:
        - $ref: '#/components/parameters/cash-sweep_components-parameters-InvestorIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollCashSweepRequest'
      responses:
        '200':
          description: Enrollment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashSweepEnrollmentResponse'
        '400':
          description: Validation error or missing disclosures
        '404':
          description: Investor or brokerage account not found
        '409':
          description: Already enrolled
    delete:
      tags:
        - Cash Sweep
      summary: Unenroll from cash sweep
      description: |
        Unenroll the investor from the cash sweep program. Requests submitted
        before 11:45 AM ET are processed same-day; after the cutoff they process
        the following business day.
      operationId: unenrollCashSweep
      parameters:
        - $ref: '#/components/parameters/cash-sweep_components-parameters-InvestorIdPath'
      responses:
        '200':
          description: Unenrollment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashSweepEnrollmentResponse'
        '404':
          description: Investor not found
        '409':
          description: Not enrolled
  /investors/{investor_id}/cash-sweep:
    get:
      tags:
        - Cash Sweep
      summary: Get cash sweep enrollment
      description: Returns the current cash sweep enrollment for the investor.
      operationId: getCashSweepEnrollment
      parameters:
        - $ref: '#/components/parameters/cash-sweep_components-parameters-InvestorIdPath'
      responses:
        '200':
          description: Enrollment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashSweepEnrollmentResponse'
        '404':
          description: No enrollment found
  /investors/{investor_id}/cash-sweep/tier:
    put:
