        resource — `financial_plan_id` is the FK to the parent plan.
      properties:
        financial_plan_id:
          type: string
          nullable: true
        currency:
          type: string
          description: ISO 4217 currency code for all monetary values in this summary
          example: USD
        total_net_worth:
          type: string
          description: Total net worth (assets - liabilities)
        total_assets:
          type: string
        total_liabilities:
          type: string
        total_goal_progress:
          type: string
          description: Overall progress across all goals (percentage)
        goals_on_track:
          type: integer
          description: Number of goals on track
        goals_at_risk:
          type: integer
          description: Number of goals at risk
        monthly_cash_flow:
          type: string
          description: Monthly income minus expenses
        savings_rate:
          type: string
          description: Percentage of income being saved/invested
        investment_portfolio_value:
          type: string
          description: Total value of investment portfolios
        generated_at:
          type: string
          format: date-time
    Goal:
      description: A financial goal for the investor
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            account_id:
              type: string
              description: The investor account this goal belongs to
              readOnly: true
            name:
              type: string
              description: Display name for the goal
              example: Retirement Fund
            goal_type:
              type: string
              enum:
                - retirement
                - education
                - emergency
                - wealth_growth
                - home_purchase
                - custom
            target_amount:
              type: string
              description: Target dollar amount
              example: '500000.00'
            target_date:
              type: string
              format: date
              description: Target completion date
              example: '2045-01-01'
            currency:
              type: string
              pattern: ^[A-Z]{3}$
              default: USD
            priority:
              type: integer
              minimum: 1
              maximum: 10
              description: Priority ranking (1 = highest)
            initial_amount:
              type: string
              description: Initial funded amount
            current_amount:
              type: string
              description: Current amount toward goal
              readOnly: true
            progress_percent:
              type: string
              description: Progress percentage toward target
              readOnly: true
            amount_remaining:
              type: string
              description: Amount still needed
              readOnly: true
            monthly_contribution:
              type: string
              description: Planned monthly contribution
            projected_completion_date:
              type: string
              format: date
              description: Projected date based on contributions and returns
              readOnly: true
            on_track:
              type: boolean
              description: Whether goal is on track to be met
