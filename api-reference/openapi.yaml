        has_power_of_attorney:
          type: boolean
        has_healthcare_directive:
          type: boolean
        beneficiaries_updated:
          type: boolean
        last_estate_review_date:
          type: string
          format: date
        estimated_estate_value:
          type: string
    CashFlowPreferences:
      type: object
      description: Cash flow and spending preferences
      properties:
        monthly_expenses:
          type: string
          description: Average monthly expenses
          example: '8000.00'
        monthly_savings_target:
          type: string
        emergency_fund_months:
          type: integer
          description: Desired months of emergency fund coverage
        discretionary_spending:
          type: string
        major_purchases_planned:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              amount:
                type: string
              target_date:
                type: string
                format: date
    InvestmentPreferences:
      type: object
      description: User-stated investment constraints and preferences. These are inputs for the AI wealth engine when generating IPS and financial plans.
      properties:
        investment_style:
          type: string
          enum:
            - passive
            - active
            - hybrid
          description: Preferred investment approach
        esg_screening:
          type: boolean
          description: Whether to apply ESG screening to investments
        esg_criteria:
          type: array
          items:
            type: string
          description: Specific ESG criteria to apply (e.g., carbon_neutral, diversity)
        shariah_compliant:
          type: boolean
          description: Whether investments must be Shariah-compliant
        excluded_sectors:
          type: array
          items:
            type: string
          description: Industry sectors to exclude (e.g., tobacco, gambling, weapons)
          example:
            - tobacco
            - gambling
        excluded_securities:
          type: array
          items:
            type: string
          description: Specific ticker symbols to exclude
        excluded_countries:
          type: array
          items:
            type: string
          description: ISO country codes to exclude from investments
        preferred_geographies:
          type: array
          items:
            type: string
          description: Preferred geographic regions for investment
          example:
            - US
            - EU
            - Asia-Pacific
        no_individual_stocks:
          type: boolean
          description: Whether to avoid individual stock picks (prefer funds/ETFs)
        max_single_position_percent:
          type: string
          description: Maximum allocation to a single position (decimal, e.g., "0.10" for 10%)
          example: '0.10'
        max_sector_concentration_percent:
          type: string
          description: Maximum allocation to a single sector (decimal, e.g., "0.25" for 25%)
          example: '0.25'
        currency_preference:
          type: string
          description: Preferred currency for investments (ISO 4217)
          example: USD
        tax_efficiency_priority:
          type: string
          enum:
            - low
            - medium
            - high
          description: How much to prioritize tax-efficient investing
        prefer_tax_advantaged:
          type: boolean
          description: Whether to prefer tax-advantaged account types
        rebalancing_preference:
          type: string
          enum:
            - monthly
            - quarterly
            - semi_annual
            - annual
            - on_threshold
          description: Preferred portfolio rebalancing frequency
    PartnerProfile:
      type: object
