        has_disability_insurance:
          type: boolean
        disability_monthly_benefit:
          type: string
        has_long_term_care:
          type: boolean
        long_term_care_daily_benefit:
          type: string
        has_umbrella_policy:
          type: boolean
        umbrella_coverage_amount:
          type: string
    EstatePlanning:
      type: object
      description: Estate planning status
      properties:
        has_will:
          type: boolean
        has_trust:
          type: boolean
        trust_type:
          type: string
          enum:
            - revocable
            - irrevocable
