  /wealth/accounts/{account_id}/profile:
    get:
      tags:
        - Investor Profile
      summary: Get investor profile
      description: |
        Retrieve the comprehensive investor profile including demographics, employment,
        tax, insurance, estate planning, investment preferences, and partner information.
        If no profile exists, a new one is auto-created with default values.
      operationId: getInvestorProfile
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The investor account ID
      responses:
        '200':
          description: Investor profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestorProfile'
              examples:
                complete_profile:
                  summary: Profile with multiple sections populated
                  value:
                    id: ipro_01j9x8m2k7qpzwv3t5r6y8n0ab
                    object: investor_profile
                    livemode: false
                    metadata: {}
                    account_id: inv_01j9x8m2k7qpzwv3t5r6y8n0cd
                    completeness_score: 75
                    last_assessed_at: '2025-01-15T10:00:00Z'
                    demographics:
                      marital_status: married
                      number_of_dependents: 2
                      expected_retirement_age: 65
                      state_of_residence: CA
                    employment:
                      employment_status: employed_full_time
                      employer_name: Tech Corp
                      annual_gross_income: '150000.00'
                    investment_preferences:
                      investment_style: passive
                      esg_screening: true
                      shariah_compliant: false
                      rebalancing_preference: quarterly
                    created_at: '2024-01-01T10:00:00Z'
                    updated_at: '2025-01-15T10:00:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags:
        - Investor Profile
      summary: Update investor profile
      description: |
        Update one or more sections of the investor profile.
        All sections are optional — only provided sections will be updated using merge semantics
        (existing fields within a section are preserved unless explicitly overwritten).
      operationId: updateInvestorProfile
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The investor account ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            examples:
              update_demographics:
                summary: Update demographics section
                value:
                  demographics:
                    marital_status: married
                    number_of_dependents: 2
                    expected_retirement_age: 65
              update_investment_preferences:
                summary: Update investment preferences
                value:
                  investment_preferences:
                    investment_style: passive
                    esg_screening: true
                    shariah_compliant: true
                    excluded_sectors:
                      - tobacco
                      - gambling
                    rebalancing_preference: quarterly
              update_multiple_sections:
                summary: Update multiple sections at once
                value:
                  employment:
                    employment_status: employed_full_time
                    employer_name: Tech Corp
                    annual_gross_income: '150000.00'
                  tax:
                    filing_status: married_filing_jointly
                    federal_tax_bracket: 0.32
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
