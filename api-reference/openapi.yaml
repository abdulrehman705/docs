  /webhooks/event-types:
    get:
      tags:
        - Webhooks
      summary: Get all available event types
      description: |
        Retrieves all event types that can be subscribed to via webhooks.

        **Available events:**

        | Event | Description |
        |-------|-------------|
        | `account.created` | New investor account created |
        | `account.updated` | Account details updated |
        | `transfer.deposit.initiated` | Deposit initiated, awaiting processing |
        | `transfer.deposit.processing` | Deposit being processed by provider |
        | `transfer.deposit.received` | Funds received (manual transfers) |
        | `transfer.deposit.completed` | Deposit completed, wallet credited |
        | `transfer.deposit.expired` | Pending deposit expired |
        | `transfer.deposit.canceled` | Deposit cancelled |
        | `transfer.deposit.failed` | Deposit failed |
        | `transfer.withdrawal.initiated` | Withdrawal initiated |
        | `transfer.withdrawal.processing` | Withdrawal being processed |
        | `transfer.withdrawal.submitted` | Withdrawal submitted to provider |
        | `transfer.withdrawal.completed` | Withdrawal completed, funds sent |
        | `transfer.withdrawal.canceled` | Withdrawal cancelled |
        | `transfer.withdrawal.failed` | Withdrawal failed |
        | `order.created` | Trading order created |
        | `order.filled` | Order fully filled |
        | `order.failed` | Order execution failed |
        | `kyc.submission.created` | KYC submission received |
        | `kyc.verification.approved` | KYC verification approved |
        | `kyc.verification.rejected` | KYC verification rejected |
      operationId: getAvailableEventTypes
      responses:
        '200':
          description: Event types retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      eventTypes:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventType'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /webhooks:
    get:
      tags:
        - Webhooks
      summary: List all webhooks
      description: Retrieves all webhooks configured for the authenticated tenant.
      operationId: listWebhooks
      responses:
        '200':
          description: Webhooks retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      webhooks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Webhooks
      summary: Create a new webhook
      description: Creates a new webhook subscription.
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
            examples:
              default:
                summary: Subscribe to order and transfer events
                value:
                  name: Production webhook
                  url: https://api.example.com/bluum/webhooks
                  description: Delivers order + transfer lifecycle events
                  eventTypeNames:
                    - order.filled
                    - order.canceled
                    - transfer.deposit.completed
                    - transfer.withdrawal.completed
      responses:
        '201':
          description: Webhook created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      webhook:
                        $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
