          $ref: '#/components/responses/NotFoundError'
  /investors/{investor_id}/close:
    post:
      tags:
        - Investors
      summary: Close an investor account
      description: |
        Closes an investor account. The account must have no open positions,
        no pending orders, and zero wallet balance. Returns 409 Conflict if
        any of these conditions are not met.
      operationId: closeAccount
      parameters:
        - $ref: '#/components/parameters/InvestorIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason for closing the account.
                  example: Customer requested account closure
      responses:
        '200':
          description: Investor closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Investor'
              examples:
                closed:
                  summary: Closed investor
                  value:
                    id: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
                    object: investor
                    created: 1740000000
                    livemode: false
                    metadata: {}
                    status: closed
                    account_type: individual
                    currency: USD
                    balance: '0.00'
                    buying_power: '0'
                    cash_withdrawable: '0'
                    last_equity: '0.00'
                    first_name: John
                    last_name: Doe
                    email: john.doe@example.com
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /investors/{investor_id}/trusted-contact:
    put:
      tags:
        - Investors
      summary: Set or update an investor's trusted contact
      description: |
        Set or update the trusted contact for an investor. FINRA SR Rule
        4512 requires partners to give end-users a way to add a trusted
        contact post-onboarding. All four fields are required together —
        partial submissions are rejected.
      operationId: setTrustedContact
      parameters:
        - $ref: '#/components/parameters/InvestorIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrustedContact'
            examples:
              default:
                summary: Set a trusted contact
                value:
                  first_name: Mary
                  last_name: Doe
                  email: mary@example.com
                  phone: '+15555550199'
      responses:
        '200':
          description: Trusted contact updated successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - object
                  - investor_id
                  - first_name
                  - last_name
                  - email
                  - phone
                properties:
                  object:
                    type: string
                    enum:
                      - trusted_contact
                  livemode:
                    type: boolean
                  investor_id:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
                  email:
                    type: string
                  phone:
                    type: string
              example:
                object: trusted_contact
                livemode: false
                investor_id: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
                first_name: Mary
                last_name: Doe
                email: mary@example.com
                phone: '+15555550199'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /investors/{investor_id}/compliance:
    get:
      tags:
        - Investors
      summary: Get compliance status for an investor
      description: |
        Retrieve the compliance/verification workflow status and individual
        check results for a specific investor. Returns the most recent
        compliance workflow.
      operationId: getAccountCompliance
      parameters:
        - $ref: '#/components/parameters/InvestorIdPath'
      responses:
        '200':
          description: Compliance status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceStatus'
              examples:
                approved:
                  summary: Approved KYC workflow
                  value:
                    object: compliance_workflow
                    livemode: false
                    investor_id: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
                    workflow_status: APPROVED
                    workflow_type: kyc
                    risk_level: low
                    status: approved
                    checks:
                      - type: identity_verification
                        status: clear
                        completed_at: '2026-03-15T10:05:00.000Z'
                      - type: screening
                        status: clear
                        completed_at: '2026-03-15T10:05:00.000Z'
                      - type: risk_assessment
                        status: clear
                        completed_at: '2026-03-15T10:05:00.000Z'
                    created_at: '2026-03-15T10:00:00.000Z'
                    updated_at: '2026-03-15T10:05:00.000Z'
                running:
                  summary: In-progress KYC workflow
                  value:
                    object: compliance_workflow
                    livemode: false
                    investor_id: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
                    workflow_status: IN_PROGRESS
                    workflow_type: kyc
                    risk_level: null
                    status: running
                    checks:
                      - type: identity_verification
                        status: pending
                        completed_at: null
                      - type: screening
                        status: pending
                        completed_at: null
                    created_at: '2026-03-15T10:00:00.000Z'
                    updated_at: '2026-03-15T10:00:00.000Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /investors/{investor_id}/wallets:
    get:
      tags:
        - Investors
      summary: List wallets for an investor
      description: |
        Retrieves all wallets (currency accounts) for a specific investor.
        Each wallet holds a balance for a specific currency.
      operationId: getAccountWallets
      parameters:
        - $ref: '#/components/parameters/InvestorIdPath'
      responses:
        '200':
          description: List of wallets.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Wallet'
              examples:
                multi_wallet:
                  summary: Investor with two wallets
                  value:
                    object: list
                    url: /v1/investors/inv_01j9x8m2k7qpzwv3t5r6y8n0ab/wallets
                    has_more: false
                    data:
                      - id: wlt_01j9x8m2k7qpzwv3t5r6y8n0cd
                        object: wallet
                        created: 1747776000
                        livemode: false
                        metadata: {}
                        currency: USD
                        balance: '1500.00'
                        available_balance: '1200.00'
                        reserved_balance: '300.00'
                        cash_withdrawable: '1000.00'
                        buying_power: '5000.00'
                        equity: '8500.00'
                        status: active
                      - id: wlt_01j9x8m2k7qpzwv3t5r6y8n0ef
                        object: wallet
                        created: 1747780000
                        livemode: false
                        metadata: {}
                        currency: EUR
                        balance: '500.00'
                        available_balance: '500.00'
                        reserved_balance: '0.00'
                        cash_withdrawable: '0'
                        buying_power: '0'
                        equity: '0'
                        status: active
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /investors/{investor_id}/transactions:
    get:
      tags:
        - Investors
      summary: List transactions for an investor
      description: |
        Returns the investor's cash activity:

        - **Funding** — `deposit` and `withdrawal` movements.
        - **Trades** — `buy` / `sell` cash settlements from filled orders.
        - **Activity** — non-trade account activity: dividends, fees,
          interest, fixed-income maturity, journals, withholdings, and
          corporate actions.

        Pending fund reservations from in-flight orders are not listed.
      operationId: listAccountTransactions
      parameters:
        - $ref: '#/components/parameters/InvestorIdPath'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - deposit
              - withdrawal
              - buy
              - sell
              - activity
          description: Filter by transaction kind (funding, trade cash movement, or custodian activity)
        - name: activity_type
          in: query
          required: false
          schema:
            type: string
            example: FIMAT,CDIV
          description: |
            Comma-separated activity tags to filter on (e.g.
            `FIMAT,CDIV`). Only meaningful when `type=activity` or `type`
            is omitted. Common values: `FIMAT` (fixed-income maturity),
            `CDIV` / `SDIV` (dividends), `DIVNRA` (dividend withholding),
            `FEE`, `INT`, `JNLC` / `JNLS` (journals), `ACATC` / `ACATS`,
            corporate actions (`FSPLIT`, `RSPLIT`, `CMA`, `SMA`,
            `REORG`, `SPIN`, `VOF`).
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - processing
              - received
              - completed
              - submitted
              - expired
              - canceled
              - failed
          description: Filter by deposit/withdrawal status (Buildmarkets-native enum, lowercased in responses)
        - name: currency
          in: query
          required: false
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: USD
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of transactions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'
