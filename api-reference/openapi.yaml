    BondPriceDetails:
      type: object
      description: |
        Fixed-income pricing extension. Populated only when the underlying
        asset is a bond. Prices are % of par; yields are decimals
        (e.g. `0.0475` = 4.75%).

        **What Alpaca exposes today**: clean price, yield to maturity, yield
        to worst. Accrued interest is applied at settlement but is not
        returned on quote requests; for hold-sizing purposes Buildmarkets
        estimates it internally. Bid/ask quotes, sizes, spreads, and
        benchmark identifiers are not part of Alpaca's fixed-income
        market-data response — those fields are omitted from this block.
      properties:
        clean_price:
          type: number
          description: Price excluding accrued interest, as % of par.
          example: 99.875
        yield_to_maturity:
          type: number
          description: Yield to maturity, annualized, decimal.
          example: 0.0475
        yield_to_worst:
          type: number
          description: Yield to worst (calls considered), decimal.
      required:
        - clean_price
        - yield_to_maturity
