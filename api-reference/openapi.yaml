openapi: 3.0.0
info:
  title: Buildmarkets Investment API
  version: 1.0.0
  description: |
    The Buildmarkets API provides embeddable investment experiences, allowing fintech partners to manage investor accounts, facilitate trading, handle document uploads, and manage wallet operations.

    ### Response conventions

    Every resource response carries a small set of Stripe-shaped envelope keys
    followed by domain fields:

    ```json
    {
      "id": "<prefix>_<base32>",
      "object": "<resource>",
      "created": <unix_seconds>,
      "livemode": <boolean>,
      "metadata": { ... },
      ... domain fields ...
    }
    ```

    List endpoints return:

    ```json
    {
      "object": "list",
      "url": "/v1/<resource>",
      "has_more": false,
      "data": [ <resource>... ]
    }
    ```

    Errors are wrapped in:

    ```json
    {
      "error": {
        "type": "invalid_request_error",
        "code": "BLUM-400-001",
        "message": "...",
        "param": "tax_id"
      }
    }
    ```

    See `ResourceEnvelope`, `ListEnvelope`, and `ErrorEnvelope` in
    `shared-schemas.yaml` for the full schemas.

    ### Field naming (Column-style)

    - snake_case throughout (no camelCase)
    - `email` / `phone` (not `email_address` / `phone_number`)
    - `first_name` / `middle_name` / `last_name` (not `given_name` / `family_name`)
    - `address: { street: [string], unit?, city, state?, postal_code?, country }`
      (the `street` array form preserves multi-line addresses; ISO 3166-1
      alpha-2 country code on `address.country` and on the top-level
      `country_of_*` fields)
    - `quantity` (not `qty`)
    - Status enums are lowercase Buildmarkets-native vocab (e.g. `pending` / `filled` / `cancelled` / `failed`),
      not Alpaca's `accepted` / `partially_filled` / `rejected` / etc.

    Regulatory vocabulary (CAIS / FINRA / IRS / FATF) is preserved verbatim
    (e.g. `tax_id_type`, `country_of_tax_residence`, `is_politically_exposed`,
    `funding_source`).

    ### Terminology

    The investor resource lives at `/v1/investors`. Path parameter is
    `investor_id`.

    ### Asset classification

    Assets carry a canonical `(class, country)` pair:
    - `class`: `equity` | `etf` | `bond` | `bill` | `note` | `mutual_fund` |
      `derivative` | `cryptocurrency` | `commodity` | `real_estate` | `cash`
    - `country`: ISO 3166-1 alpha-2, lower-case (`us`, `ng`, …). Null for
      country-agnostic instruments (most crypto).

    The legacy combined field `asset_class` (e.g. `us_equity`, `ng_bond`)
    is still accepted on requests and emitted on responses for backwards
    compatibility, but is deprecated and will be removed.

    ### Fixed income (bonds)

    Bond orders use the same `POST /v1/investors/{investor_id}/orders`
    endpoint as equities, with bond-specific semantics:
    - `quantity` carries **face value** (e.g. `"10000"` for $10k face),
      and must be a multiple of the bond's `min_increment`.
    - `limit_price` is quoted as **% of par** (e.g. `"99.875"` = 99.875%
      of face value).
    - `settlement_date` is optional; defaults to T+1 for US treasuries
      and T+2 for corporates.
    - Bond quote responses (`/v1/market-data/assets/{symbol}/quote`)
      include a `bond` block with clean/dirty price, accrued interest,
      and yield to maturity.

    Bond trading must be explicitly enabled on the tenant before orders
    will route. Contact Buildmarkets support to flip `fixedIncomeEnabled`.

    ### Authentication

    HTTP Basic Authentication. **API Key** is the username, **API Secret** is
    the password. Base64-encode `API_KEY:API_SECRET` and send in the
    `Authorization` header.
servers:
  - url: https://service.bluumfinance.com/v1
    description: Production Environment
  - url: https://test-service.bluumfinance.com/v1
    description: Sandbox/Testing Environment
security:
  - BluumApiKeyAuth: []
  - BearerAuth: []
tags:
  - name: Investors
    description: Create and manage investor accounts, wallets, and transactions.
  - name: Compliance
    description: Investor compliance workflows, KYC checks, and document submissions.
  - name: Transfers
    description: Deposit and withdrawal operations for investor wallets.
  - name: Funding Sources
    description: Connect and manage external funding sources (Plaid, bank accounts).
  - name: Trading
    description: Place, list, and cancel investor orders.
  - name: Positions
    description: View investor portfolio positions.
  - name: Assets
    description: Search and retrieve asset reference data.
  - name: Document Management
    description: Upload, list, and download documents.
  - name: Markets
    description: Market reference data, status, calendar, and halts.
  - name: Market Data
    description: Real-time quotes, snapshots, and historical bars (paywalled product).
  - name: Webhooks
    description: Register and manage webhook endpoints for event delivery.
  - name: Disclosures
    description: Partner-facing disclosure library (verbatim regulated copy, PDFs) + per-investor acceptance trail.
  - name: Cash Sweep
    description: High Yield Cash (HYC) / FDIC Bank Sweep enrollment, tier management, and interest reporting.
  - name: Investor Profile
    description: '[Wealth] Manage investor demographics, employment, tax, and preferences.'
  - name: Dependents
    description: '[Wealth] Manage investor dependents.'
  - name: Risk Assessment
    description: '[Wealth] Submit and view investor risk assessments.'
  - name: Goals
    description: '[Wealth] Create and manage financial goals.'
  - name: Life Events
    description: '[Wealth] Track significant life events that affect financial planning.'
  - name: External Accounts
    description: '[Wealth] Manage accounts held outside the platform.'
  - name: Financial Plan
    description: '[Wealth] Generate and view financial plans.'
  - name: Investment Policy
    description: '[Wealth] Create and validate investment policy statements.'
  - name: Portfolio Management
    description: '[Wealth] Portfolio summary, holdings, performance, and rebalancing.'
  - name: Auto-Invest
    description: '[Wealth] Recurring investment schedules and dividend reinvestment.'
  - name: Insights & Recommendations
    description: '[Wealth] AI-driven insights, recommendations, and tax optimization.'
  - name: Reports
    description: '[Wealth] Account statements, P&L, and benchmark reports.'
paths:
  /investors:
    get:
      tags:
        - Investors
      summary: List all investors for the authenticated tenant
      operationId: listAccounts
      responses:
        '200':
          description: List of investors.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Investor'
              examples:
                success:
                  summary: One active investor
                  value:
                    object: list
                    url: /v1/investors
                    has_more: false
                    data:
                      - id: inv_01j9x8m2k7qpzwv3t5r6y8n0ab
                        object: investor
                        created: 1747776000
                        livemode: false
                        metadata: {}
                        status: active
                        account_type: individual
                        management_type: self_directed
                        tax_advantaged: false
                        tax_designation: null
                        account_number: '968430933'
                        currency: USD
                        balance: '1000.00'
                        buying_power: '10000.00'
                        cash_withdrawable: '5000.00'
                        last_equity: '5000.00'
                        crypto_status: null
                        trading_type: cash
                        first_name: John
                        middle_name: null
                        last_name: Doe
                        date_of_birth: '1980-01-01'
                        email: john.doe@example.com
                        phone: '+15555555555'
                        address:
                          street:
                            - 123 Main St
                          unit: null
                          city: Berkeley
                          state: CA
                          postal_code: '94704'
                          country: US
                        tax_id_type: SSN
                        country_of_tax_residence: US
                        country_of_citizenship: US
                        country_of_birth: US
                        funding_source:
                          - employment_income
                        is_control_person: false
                        is_affiliated_exchange_or_finra: false
                        is_affiliated_exchange_or_iiroc: null
