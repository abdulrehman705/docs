  /documents:
    post:
      tags:
        - Document Management
      summary: Upload a document (flat resource)
      description: |
        Uploads a document. Owner is inferred from the body:
          * `investor_id` set → owner is the investor
          * `user_id`     set → owner is the user (e.g., UBO)
          * neither set       → owner is the calling tenant
        `investor_id` and `user_id` are mutually exclusive.
      operationId: createDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - document
                - document_type
              properties:
                document:
                  type: string
                  format: binary
                  description: The file to upload (PDF, JPG, PNG, DOC, DOCX up to 10MB).
                document_type:
                  type: string
                  description: Free-form document classifier (e.g., `passport`, `proof_of_address`).
                purpose:
                  type: string
                  enum:
                    - KYC
                    - KYB
                    - EDD
                    - TAX
                    - FUNDING_VERIFICATION
                    - AGREEMENT
                    - ACCOUNT_STATEMENT
                    - TRADE_CONFIRMATION
                    - OTHER
                  description: Optional purpose tag; used for retention bookkeeping.
                investor_id:
                  type: string
                  description: Investor owner (prefixed `inv_…` id). Mutually exclusive with `user_id`.
                user_id:
                  type: string
                  description: User owner (e.g., UBO uploads). Mutually exclusive with `investor_id`.
                expires_at:
                  type: string
                  format: date-time
                  description: Optional explicit retention deadline.
                compliance_workflow_id:
                  type: string
                  format: uuid
                  description: Optional compliance workflow to link this document to.
                compliance_check_id:
                  type: string
                  format: uuid
                  description: Optional compliance check to link this document to.
                metadata:
                  type: object
                  additionalProperties: true
                  description: |
                    Optional metadata key-value pairs. For multipart clients that cannot send nested
                    objects, pass a JSON-encoded string; the API accepts either form.
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    get:
