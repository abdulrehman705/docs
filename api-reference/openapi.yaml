            data:
              type: array
              items:
                $ref: '#/components/schemas/Dependent'
    RiskAssessment:
      description: A risk assessment capturing the investor's risk tolerance and investment experience
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            account_id:
              type: string
              readOnly: true
            questionnaire_id:
              type: string
              description: ID of the questionnaire template used
            questionnaire_version:
              type: integer
              description: Version of the questionnaire
            computed_risk_score:
              type: integer
              minimum: 1
              maximum: 10
              nullable: true
              description: Computed risk score (1-10, where 10 is highest risk tolerance)
            risk_tolerance:
              type: string
              enum:
                - conservative
                - moderately_conservative
                - moderate
                - moderately_aggressive
                - aggressive
              nullable: true
            volatility_tolerance:
              type: string
              enum:
                - low
                - medium
                - high
              nullable: true
            investment_experience:
              type: string
              enum:
                - none
                - limited
                - moderate
                - extensive
              nullable: true
            years_investing:
              type: integer
              nullable: true
            completed_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
              nullable: true
              description: When this assessment expires (typically 1 year)
            status:
              type: string
              enum:
                - active
                - expired
                - superseded
            created_at:
              type: string
              format: date-time
              readOnly: true
    RiskAssessmentDetail:
      allOf:
        - $ref: '#/components/schemas/RiskAssessment'
        - type: object
          properties:
            responses:
              type: array
              description: Individual questionnaire responses
