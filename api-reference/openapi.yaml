        credit_limit:
          type: string
          pattern: ^\d+(\.\d{2})?$
        property_value:
          type: string
          pattern: ^\d+(\.\d{2})?$
        appreciation_rate:
          type: string
          pattern: ^\d+(\.\d+)?$
        contribution_limit:
          type: string
          pattern: ^\d+(\.\d{2})?$
        employer_match:
          type: string
          pattern: ^\d+(\.\d+)?$
        vesting_schedule:
          type: object
          additionalProperties: true
        notes:
          type: string
          maxLength: 500
    RiskProfile:
      type: object
      required:
        - risk_tolerance
      properties:
        risk_tolerance:
          type: string
          enum:
            - conservative
            - moderately_conservative
            - moderate
            - moderately_aggressive
            - aggressive
        risk_score:
          type: integer
          minimum: 1
          maximum: 10
          description: Numeric risk score (1 = very conservative, 10 = very aggressive)
        volatility_tolerance:
          type: string
          enum:
            - low
            - medium
            - high
          description: Tolerance for portfolio volatility
    TimeHorizon:
      type: object
      required:
        - years
      properties:
        years:
          type: integer
          minimum: 1
          maximum: 50
          description: Investment time horizon in years
        category:
          type: string
          enum:
            - short_term
            - medium_term
            - long_term
          description: Short (<3yr), medium (3-10yr), long (>10yr)
    InvestmentObjectives:
      type: object
      required:
        - primary
      properties:
        primary:
          type: string
          enum:
            - capital_preservation
            - capital_appreciation
            - income_generation
            - tax_efficiency
            - balanced
        secondary:
          type: array
          items:
            type: string
            enum:
              - capital_preservation
              - capital_appreciation
              - income_generation
              - tax_efficiency
              - balanced
        target_annual_return:
          type: string
          description: Target annual return percentage
          example: '7.00'
    AllocationBand:
      type: object
      required:
        - target_percent
      properties:
        target_percent:
          type: string
          description: Target allocation percentage
          example: '50.00'
        min_percent:
          type: string
          description: Minimum allocation percentage
          example: '40.00'
        max_percent:
          type: string
          description: Maximum allocation percentage
          example: '60.00'
        sub_allocations:
          type: object
          description: Sub-allocations within this asset class
          additionalProperties:
            type: string
          example:
            us_large_cap: '30.00'
            us_small_cap: '10.00'
            international: '10.00'
    TargetAllocation:
      type: object
      description: Target asset allocation with min/max bands
      additionalProperties:
        $ref: '#/components/schemas/AllocationBand'
      example:
        equities:
          target_percent: '50.00'
          min_percent: '40.00'
          max_percent: '60.00'
        fixed_income:
          target_percent: '25.00'
          min_percent: '20.00'
          max_percent: '30.00'
        treasury:
          target_percent: '20.00'
          min_percent: '15.00'
          max_percent: '25.00'
        alternatives:
          target_percent: '5.00'
          min_percent: '0.00'
          max_percent: '10.00'
    IpsConstraints:
      type: object
      description: Investment constraints and guidelines
      properties:
        liquidity_requirements:
          type: object
          properties:
            minimum_cash_percent:
              type: string
              description: Minimum cash allocation percentage
              example: '5.00'
            emergency_fund_months:
              type: integer
              description: Months of expenses to keep liquid
              example: 6
        tax_considerations:
          type: object
          properties:
            tax_loss_harvesting:
              type: boolean
              default: false
            tax_bracket:
              type: string
              example: '24'
            prefer_tax_advantaged:
              type: boolean
              default: true
        restrictions:
          type: object
          properties:
            excluded_sectors:
              type: array
              items:
                type: string
              example:
                - tobacco
                - gambling
            excluded_securities:
              type: array
              items:
                type: string
              description: Specific symbols to exclude
            no_individual_stocks:
              type: boolean
              default: false
            esg_screening:
              type: boolean
              default: false
            esg_criteria:
              type: array
              items:
                type: string
                enum:
                  - environmental
                  - social
                  - governance
            shariah_compliant:
              type: boolean
              default: false
              description: Whether investments must be Shariah-compliant
        rebalancing_policy:
          type: object
          properties:
            frequency:
              type: string
              enum:
                - monthly
                - quarterly
                - semi_annual
                - annual
                - threshold_only
              default: quarterly
            threshold_percent:
              type: string
              description: Drift threshold that triggers rebalancing
              example: '5.00'
            tax_aware:
              type: boolean
              default: true
    PortfolioListItem:
      description: Compact envelope-wrapped portfolio summary used in list responses.
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            name:
              type: string
            currency:
              type: string
            status:
              type: string
            updated_at:
              type: string
              format: date-time
    PortfolioListResponse:
      description: List envelope of PortfolioListItem resources.
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/PortfolioListItem'
    Holding:
      type: object
      properties:
        position_id:
          type: string
        asset_id:
          type: string
        symbol:
          type: string
        name:
          type: string
        currency:
          type: string
          description: ISO 4217 currency code for the asset's trading currency
          example: USD
        asset_class:
          type: string
        sector:
          type: string
        quantity:
          type: string
        average_cost_basis:
          type: string
        total_cost_basis:
          type: string
        current_price:
          type: string
        market_value:
          type: string
        unrealized_pl:
          type: string
        unrealized_pl_percent:
          type: string
        weight_percent:
          type: string
        price_source:
          type: string
          enum:
            - ALPACA
            - NAYA
            - DATABASE
            - MANUAL
        price_confidence:
          type: string
          enum:
            - REAL_TIME
            - DELAYED
            - END_OF_DAY
            - STALE
        price_timestamp:
          type: string
          format: date-time
    AutoInvestScheduleList:
      description: List envelope of AutoInvestSchedule resources.
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AutoInvestSchedule'
    DripConfigurationRequest:
      type: object
      properties:
        enabled:
          type: boolean
        reinvestment_rule:
          type: string
          enum:
            - same_security
            - portfolio_allocation
            - custom
        custom_allocation:
          type: object
          additionalProperties:
            type: string
        minimum_amount:
          type: string
          pattern: ^\d+(\.\d{2})?$
        cash_sweep_enabled:
          type: boolean
        cash_sweep_threshold:
          type: string
          pattern: ^\d+(\.\d{2})?$
    Recommendation:
      description: AI-powered investment recommendation
      allOf:
        - $ref: '#/components/schemas/ResourceEnvelope'
        - type: object
          properties:
            type:
              type: string
              enum:
                - allocation
                - security
                - strategy
            title:
              type: string
            rationale:
              type: string
            confidence:
              type: string
              enum:
                - high
                - medium
                - low
            expected_impact:
              type: object
              properties:
                risk_adjusted_return_improvement:
                  type: string
                diversification_score_improvement:
                  type: string
            suggested_actions:
              type: array
              items:
                type: object
                properties:
                  action:
                    type: string
                    enum:
                      - buy
                      - sell
                      - hold
                      - increase
                      - decrease
                  symbol:
                    type: string
                  name:
                    type: string
                  target_allocation:
                    type: string
                  current_allocation:
                    type: string
  responses:
    UnauthorizedError:
      description: Authentication information is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: authentication_error
              code: BLUM-401-001
              message: Missing or invalid Authorization header.
    ForbiddenError:
      description: Access to the requested resource is forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: permission_error
              code: BLUM-403-001
              message: Access denied to this resource.
    BadRequestError:
      description: The request was malformed or failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: invalid_request_error
              code: BLUM-400-002
              message: Required field 'symbol' is missing.
              param: symbol
    NotFoundError:
      description: The requested resource could not be found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: not_found_error
              code: BLUM-404-001
              message: Investor not found.
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: api_error
              code: BLUM-500-001
              message: An internal server error occurred. Please try again later.
    ConflictError:
      description: The request conflicts with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              type: conflict_error
              code: BLUM-409-002
              message: Investor has open positions. Liquidate all positions before closing.
  parameters:
    InvestorIdPath:
      name: investor_id
      in: path
      required: true
      schema:
        type: string
      description: Prefixed public id of the investor (e.g. `inv_…`).
    OrderIdPath:
      name: order_id
      in: path
      required: true
      schema:
        type: string
      description: Prefixed public id of the order (e.g. `ord_…`).
    parameters-InvestorIdPath:
      name: investor_id
      in: path
      required: true
      schema:
        type: string
      description: The prefixed public id of the investor (e.g. `inv_…`).
    components-parameters-InvestorIdPath:
      name: investor_id
      in: path
      required: true
      schema:
        type: string
      description: Prefixed public investor id (`inv_…`).
    cash-sweep_components-parameters-InvestorIdPath:
      name: investor_id
      in: path
      required: true
      description: Investor ID (prefixed, e.g. `inv_...`)
      schema:
        type: string
    transfers_components-parameters-InvestorIdPath:
      name: investor_id
      in: path
      required: true
      schema:
        type: string
      description: The prefixed public id of the investor (e.g. inv_…).
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: |
        A unique key to ensure idempotency of the request.
        If a request with the same idempotency key has already been processed,
        the original response will be returned.
    DepositIdPath:
      name: deposit_id
      in: path
      required: true
      schema:
        type: string
      description: The prefixed public id of the deposit (e.g. dep_…).
    WithdrawalIdPath:
      name: withdrawal_id
      in: path
      required: true
      schema:
        type: string
      description: The prefixed public id of the withdrawal (e.g. wd_…).
